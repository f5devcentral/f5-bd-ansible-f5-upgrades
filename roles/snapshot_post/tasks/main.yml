---
# =============================================================================
# snapshot_post - Collect post-upgrade state and diff against pre-snapshot
# =============================================================================
# Uses f5networks.f5_bigip.bigip_device_info in two passes:
#   Pass 1: gather_subset: partitions  - get all partition names
#   Pass 2: loop over partitions        - collect VS and pool per partition
# =============================================================================

- name: "SNAPSHOT_POST | Verify pre-snapshot file exists"
  ansible.builtin.stat:
    path: "{{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre.json"
  register: pre_snap_stat
  delegate_to: localhost
  failed_when: not pre_snap_stat.stat.exists

- name: "SNAPSHOT_POST | Load pre-snapshot data"
  ansible.builtin.set_fact:
    snapshot_pre_loaded: "{{ lookup('file', snapshot_output_dir + '/' + inventory_hostname + '_' + snapshot_timestamp + '_pre.json') | from_json }}"
  delegate_to: localhost

- name: "SNAPSHOT_POST | Reset persistent connection to BIG-IP"
  ansible.builtin.meta: reset_connection

# -----------------------------------------------------------------------------
# Pass 1 - Get partition list and system-info/sync-status
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_POST | Pass 1 - collect partitions and system info"
  f5networks.f5_bigip.bigip_device_info:
    gather_subset:
      - partitions
      - sync-status
      - system-info
  register: snap_post_base_info

- name: "SNAPSHOT_POST | Set partition list fact"
  ansible.builtin.set_fact:
    snap_post_partition_names: >-
      {{ snap_post_base_info.partitions | default([]) | map(attribute='name') | list }}

- name: "SNAPSHOT_POST | Display partitions found"
  ansible.builtin.debug:
    msg: "Partitions found on {{ inventory_hostname }}: {{ snap_post_partition_names }}"

# -----------------------------------------------------------------------------
# Pass 2 - Collect VS and pools per partition
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_POST | Pass 2 - collect VS and pools per partition"
  f5networks.f5_bigip.bigip_device_info:
    gather_subset:
      - virtual-servers
      - ltm-pools
    partition: "{{ item }}"
  register: snap_post_per_partition
  loop: "{{ snap_post_partition_names }}"
  when: snap_post_partition_names | length > 0

- name: "SNAPSHOT_POST | Merge VS results across all partitions"
  ansible.builtin.set_fact:
    snap_post_all_virtual_servers: >-
      {{ snap_post_per_partition.results
         | selectattr('virtual_servers', 'defined')
         | map(attribute='virtual_servers')
         | flatten }}
  when: snap_post_partition_names | length > 0

- name: "SNAPSHOT_POST | Merge pool results across all partitions"
  ansible.builtin.set_fact:
    snap_post_all_ltm_pools: >-
      {{ snap_post_per_partition.results
         | selectattr('ltm_pools', 'defined')
         | map(attribute='ltm_pools')
         | flatten }}
  when: snap_post_partition_names | length > 0

- name: "SNAPSHOT_POST | Collect AS3 declarations via bigip_device_info (Common returns all tenants)"
  f5networks.f5_bigip.bigip_device_info:
    gather_subset:
      - as3
    partition: Common
  register: snap_post_as3_info
  ignore_errors: true

- name: "SNAPSHOT_POST | Write AS3 declarations snapshot file"
  ansible.builtin.copy:
    dest: "{{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_post_as3.json"
    content: "{{ as3_snapshot_data | to_nice_json }}"
    mode: '0644'
  vars:
    as3_snapshot_data:
      metadata:
        hostname: "{{ inventory_hostname }}"
        management_ip: "{{ ansible_host }}"
        phase: post
        timestamp: "{{ snapshot_timestamp }}"
        note: >-
          AS3 declarations from /Common - returns all tenants in one call.
          Represents desired/declared state only.
          For operational status see the post.json snapshot.
      declaration: "{{ snap_post_as3_info.ansible_facts.ansible_net_as3_config.declaration | default({}) }}"
  delegate_to: localhost
  when:
    - snap_post_as3_info is not failed
    - snap_post_as3_info.ansible_facts is defined
    - snap_post_as3_info.ansible_facts.ansible_net_as3_config is defined

# -----------------------------------------------------------------------------
# AS3 Declaration Diff
# Load pre AS3 snapshot and compare against post.
# AS3 declarations should survive upgrade unchanged.
# Differences are flagged as WARNING - not a failure since the upgrade
# itself should not modify AS3 config.
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_POST | Check if pre AS3 snapshot exists"
  ansible.builtin.stat:
    path: "{{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre_as3.json"
  register: pre_as3_stat
  delegate_to: localhost

- name: "SNAPSHOT_POST | Load pre AS3 snapshot"
  ansible.builtin.set_fact:
    snap_pre_as3_loaded: "{{ lookup('file', snapshot_output_dir + '/' + inventory_hostname + '_' + snapshot_timestamp + '_pre_as3.json') | from_json }}"
  delegate_to: localhost
  when: pre_as3_stat.stat.exists

- name: "SNAPSHOT_POST | Normalise pre AS3 declaration for comparison"
  ansible.builtin.set_fact:
    snap_pre_as3_normalised: >-
      {{ snap_pre_as3_loaded.declaration | default({}) | to_json | from_json
         | dict2items
         | rejectattr('key', 'in', ['controls', 'updateMode'])
         | list | items2dict | to_json(sort_keys=True) }}
  delegate_to: localhost
  when: pre_as3_stat.stat.exists

- name: "SNAPSHOT_POST | Normalise post AS3 declaration for comparison"
  ansible.builtin.set_fact:
    snap_post_as3_normalised: >-
      {{ snap_post_as3_info.ansible_facts.ansible_net_as3_config.declaration | default({}) | to_json | from_json
         | dict2items
         | rejectattr('key', 'in', ['controls', 'updateMode'])
         | list | items2dict | to_json(sort_keys=True) }}
  when:
    - snap_post_as3_info is not failed
    - snap_post_as3_info.ansible_facts is defined
    - snap_post_as3_info.ansible_facts.ansible_net_as3_config is defined

- name: "SNAPSHOT_POST | Compute AS3 declaration diff"
  ansible.builtin.set_fact:
    diff_as3:
      pre_declaration: "{{ snap_pre_as3_loaded.declaration | default({}) }}"
      post_declaration: "{{ snap_post_as3_info.ansible_facts.ansible_net_as3_config.declaration | default({}) }}"
      changed: "{{ snap_pre_as3_normalised != snap_post_as3_normalised }}"
      note: "Comparison excludes 'controls' and 'updateMode' keys. Both sides normalised via JSON roundtrip for consistent types."
  when:
    - pre_as3_stat.stat.exists
    - snap_post_as3_info is not failed
    - snap_post_as3_info.ansible_facts is defined
    - snap_post_as3_info.ansible_facts.ansible_net_as3_config is defined

- name: "SNAPSHOT_POST | AS3 declaration unchanged - OK"
  ansible.builtin.debug:
    msg: "AS3 declarations unchanged pre vs post - OK"
  when:
    - diff_as3 is defined
    - not diff_as3.changed | bool

- name: "SNAPSHOT_POST | WARNING - AS3 declaration changed during upgrade"
  ansible.builtin.debug:
    msg: >-
      WARNING: AS3 declarations differ between pre and post upgrade snapshots
      on {{ inventory_hostname }}. AS3 config should not change during an upgrade.
      Review pre_as3.json and post_as3.json to identify changes.
  when:
    - diff_as3 is defined
    - diff_as3.changed | bool

- name: "SNAPSHOT_POST | Fallback - empty VS and pool lists if no partitions"
  ansible.builtin.set_fact:
    snap_post_all_virtual_servers: []
    snap_post_all_ltm_pools: []
  when: snap_post_partition_names | length == 0

# -----------------------------------------------------------------------------
# Routes and ARP via bigip_command
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_POST | Get route table via tmsh"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "tmsh show /net route"
  register: snap_post_routes

- name: "SNAPSHOT_POST | Get ARP table via tmsh"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "tmsh show /net arp all"
  register: snap_post_arp

# -----------------------------------------------------------------------------
# HA failover state via uri
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_POST | Get HA failover state"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/failover/stats"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 60
  register: snap_post_failover
  delegate_to: localhost
  retries: 5
  delay: 15
  until: snap_post_failover.status == 200
  # TROUBLESHOOTING: no_log: true

# -----------------------------------------------------------------------------
# Normalise HA state values
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_POST | Normalise - HA failover state"
  ansible.builtin.set_fact:
    snap_post_failover_state: >-
      {{ 'active' if snap_post_failover.json.get('apiRawValues', {})
         .get('apiAnonymous', '') | lower is search('active')
         else 'standby' }}

- name: "SNAPSHOT_POST | Normalise - config sync state from module"
  ansible.builtin.set_fact:
    snap_post_sync_state: >-
      {{ snap_post_base_info.sync_status | default([]) | first
         | default({}) | json_query('status') | default('unknown') }}

# -----------------------------------------------------------------------------
# Write post-snapshot JSON
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_POST | Write post-snapshot JSON file"
  ansible.builtin.copy:
    dest: "{{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_post.json"
    content: "{{ snapshot_post_data | to_nice_json }}"
    mode: '0644'
  vars:
    snapshot_post_data:
      metadata:
        hostname: "{{ inventory_hostname }}"
        management_ip: "{{ ansible_host }}"
        phase: post
        timestamp: "{{ snapshot_timestamp }}"
        version: "{{ snap_post_base_info.system_info.product_version | default('unknown') }}"
        platform: "{{ snap_post_base_info.system_info.platform | default('unknown') }}"
        marketing_name: "{{ snap_post_base_info.system_info.marketing_name | default('unknown') }}"
        chassis_serial: "{{ snap_post_base_info.system_info.chassis_serial | default('unknown') }}"
        ha_failover_state: "{{ snap_post_failover_state }}"
        sync_state: "{{ snap_post_sync_state }}"
        partitions: "{{ snap_post_partition_names }}"
      virtual_servers: "{{ snap_post_all_virtual_servers | default([]) }}"
      ltm_pools: "{{ snap_post_all_ltm_pools | default([]) }}"
      routes: >-
          {{ snap_post_routes.stdout_lines[0] | default([]) | reject('match', '^-+$') | reject('match', '^Net::') | reject('match', '^Name\s') | reject('match', '^\s*$') | list }}
      arp: >-
          {{ snap_post_arp.stdout_lines[0] | default([]) | reject('match', '^-+$') | reject('match', '^Net::') | reject('match', '^Name\s') | reject('match', '^\s*$') | list }}
  delegate_to: localhost

# -----------------------------------------------------------------------------
# Compute diffs
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_POST | Compute virtual server state changes"
  ansible.builtin.set_fact:
    diff_vs: >-
      {%- set pre_vs = snapshot_pre_loaded.virtual_servers | default([]) -%}
      {%- set post_vs = snap_post_all_virtual_servers | default([]) -%}
      {%- set results = [] -%}
      {%- for post in post_vs -%}
        {%- set pre = pre_vs | selectattr('full_path', 'equalto', post.full_path) | list | first | default({}) -%}
        {%- set pre_avail = pre.availability_status | default('not_in_pre') -%}
        {%- set post_avail = post.availability_status | default('unknown') -%}
        {%- set pre_enabled = pre.enabled | default('not_in_pre') -%}
        {%- set post_enabled = post.enabled | default('unknown') -%}
        {%- set changed = (pre_avail != post_avail) or (pre_enabled != post_enabled) -%}
        {%- set regressed = (pre_avail == 'available' and post_avail != 'available') -%}
        {%- set _ = results.append({
          'name': post.name,
          'full_path': post.full_path | default(post.name),
          'partition': post.full_path | default('/Common/' + post.name) | regex_replace('^/([^/]+)/.*', '\\1'),
          'pre_availability': pre_avail,
          'post_availability': post_avail,
          'pre_enabled': pre_enabled,
          'post_enabled': post_enabled,
          'changed': changed,
          'regressed': regressed
        }) -%}
      {%- endfor -%}
      {{ results }}

- name: "SNAPSHOT_POST | Compute route changes"
  ansible.builtin.set_fact:
    diff_routes:
      pre_line_count: "{{ snapshot_pre_loaded.routes | default([]) | length }}"
      post_line_count: >-
        {{ snap_post_routes.stdout_lines[0]
           | default([])
           | reject('match', '^-+$')
           | reject('match', '^Net::')
           | reject('match', '^Name\s')
           | reject('match', '^\s*$')
           | list
           | length }}
      changed: >-
        {{ snapshot_pre_loaded.routes | default([]) | length !=
           (
             snap_post_routes.stdout_lines[0]
             | default([])
             | reject('match', '^-+$')
             | reject('match', '^Net::')
             | reject('match', '^Name\s')
             | reject('match', '^\s*$')
             | list
             | length
           )
        }}

- name: "SNAPSHOT_POST | Compute version change"
  ansible.builtin.set_fact:
    diff_version:
      pre: "{{ snapshot_pre_loaded.metadata.version | default('unknown') }}"
      post: "{{ snap_post_base_info.system_info.product_version | default('unknown') }}"
      upgraded: "{{ snapshot_pre_loaded.metadata.version | default('') != snap_post_base_info.system_info.product_version | default('') }}"

- name: "SNAPSHOT_POST | Compute HA state change"
  ansible.builtin.set_fact:
    diff_ha:
      pre_failover_state: "{{ snapshot_pre_loaded.metadata.ha_failover_state | default('unknown') }}"
      post_failover_state: "{{ snap_post_failover_state }}"
      pre_sync_state: "{{ snapshot_pre_loaded.metadata.sync_state | default('unknown') }}"
      post_sync_state: "{{ snap_post_sync_state }}"

- name: "SNAPSHOT_POST | Compute regression summary"
  ansible.builtin.set_fact:
    diff_regression_summary:
      vs_regressions: "{{ diff_vs | selectattr('regressed', 'equalto', true) | list }}"
      vs_regression_count: "{{ diff_vs | selectattr('regressed', 'equalto', true) | list | length }}"
      routes_changed: "{{ diff_routes.changed }}"
      sync_state_change: >-
        {{ snapshot_pre_loaded.metadata.sync_state | default('unknown') }}
        -> {{ snap_post_sync_state }}
      sync_note: >-
        Sync state change during upgrade is expected due to version mismatch
        between HA nodes. Check final post-snapshot for sync recovery.

# -----------------------------------------------------------------------------
# Write diff JSON
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_POST | Write diff JSON file"
  ansible.builtin.copy:
    dest: "{{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_diff.json"
    content: "{{ diff_data | to_nice_json }}"
    mode: '0644'
  vars:
    diff_data:
      metadata:
        hostname: "{{ inventory_hostname }}"
        management_ip: "{{ ansible_host }}"
        snapshot_timestamp: "{{ snapshot_timestamp }}"
        pre_file: "{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre.json"
        post_file: "{{ inventory_hostname }}_{{ snapshot_timestamp }}_post.json"
      version: "{{ diff_version }}"
      ha: "{{ diff_ha }}"
      virtual_servers: "{{ diff_vs }}"
      routes: "{{ diff_routes }}"
      regression_summary: "{{ diff_regression_summary }}"
      as3: "{{ diff_as3 | default({'note': 'AS3 not present or pre snapshot not available'}) }}"
  delegate_to: localhost

# -----------------------------------------------------------------------------
# Fail if regressions detected
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_POST | Fail if VS regressions detected"
  ansible.builtin.fail:
    msg: >-
      POST-UPGRADE REGRESSION on {{ inventory_hostname }}:
      {{ diff_regression_summary.vs_regression_count }} VS(es) that were available
      before upgrade are no longer available.
      Diff: {{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_diff.json
  when:
    - snapshot_fail_on_regression | bool
    - diff_regression_summary.vs_regression_count | int > 0
