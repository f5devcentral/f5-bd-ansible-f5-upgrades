---
# =============================================================================
# bigip_upgrade - Image install and activation
# =============================================================================
# Image is already on BIG-IP /shared/images/ verified by bastion_image_push.
#
# NOTE: f5networks.f5_bigip module volume_uri polling is broken - the httpapi
# persistent socket dies after state=activated. Ticket raised against module.
# Workaround: URI polling via delegate_to: localhost (confirmed working).
#
# Flow:
#   1. state=activated  - triggers install (socket dies here, expected)
#   2. Pause 120s       - wait past the 0% startup phase before polling
#   3. URI poll         - every 30s up to 30 min until:
#                         a. status == 'complete'   -> pause 6 min for reboot
#                         b. 'restarting' in status -> device rebooting
#                         c. non-200 / unreachable  -> already mid-reboot
#   4. bigip_reboot_triggered = true -> bigip_wait handles readiness
# =============================================================================

# -----------------------------------------------------------------------------
# Pre-flight - version check
# -----------------------------------------------------------------------------

- name: "UPGRADE | Check current running version"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/version"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 60
  register: bigip_current_version_check
  delegate_to: localhost
  retries: 10
  delay: 15
  until: bigip_current_version_check.status == 200
  # TROUBLESHOOTING: no_log: true

- name: "UPGRADE | Set current version fact"
  ansible.builtin.set_fact:
    bigip_current_version: >-
      {{ bigip_current_version_check.json.get('entries', {})
         .get('https://localhost/mgmt/tm/sys/version/0', {})
         .get('nestedStats', {})
         .get('entries', {})
         .get('Version', {})
         .get('description', 'unknown') }}

- name: "UPGRADE | Set target version - explicit override or auto-parse from filename"
  ansible.builtin.set_fact:
    bigip_target_version: >-
      {{ bigip_target_version
         if bigip_target_version is defined and bigip_target_version != ''
         else (bigip_ehf_filename if bigip_ehf_filename is defined and bigip_ehf_filename != ''
               else bigip_image_filename)
              | regex_replace('^(?:Hotfix-)?BIGIP-(\d+\.\d+\.\d+\.\d+).*\.iso$', '\1') }}

- name: "UPGRADE | Fail if target version cannot be determined from filename"
  ansible.builtin.fail:
    msg: |
      Cannot determine target version from image filename.
      Filename '{{ bigip_ehf_filename if bigip_ehf_filename is defined and bigip_ehf_filename != '' else bigip_image_filename }}'
      does not match expected format BIGIP-X.X.X.X-*.iso
      Options:
        - Rename the ISO to the original F5 filename format e.g. BIGIP-17.5.1.5-0.0.6.iso
        - Set bigip_target_version: "17.5.1.5" explicitly in AAP Extra Variables
  when: bigip_target_version | regex_search('^\d+\.\d+\.\d+\.\d+$') is none

- name: "UPGRADE | Display current version"
  ansible.builtin.debug:
    msg: "{{ ansible_host }} current version: {{ bigip_current_version }} | target: {{ bigip_target_version }}"

- name: "UPGRADE | Skip if target version already running"
  ansible.builtin.meta: end_host
  when: bigip_current_version is defined and bigip_target_version in bigip_current_version

- name: "UPGRADE | Dry-run mode - skipping install and reboot"
  ansible.builtin.debug:
    msg: |
      DRY RUN: Would install
      {{ 'EHF: ' + bigip_ehf_filename if bigip_ehf_filename is defined and bigip_ehf_filename != '' else 'Image: ' + bigip_image_filename }}
      to {{ bigip_install_volume }} on {{ ansible_host }}
  when: bigip_upgrade_dry_run | bool

- name: "UPGRADE | End host - dry run mode"
  ansible.builtin.meta: end_host
  when: bigip_upgrade_dry_run | bool

# -----------------------------------------------------------------------------
# Pre-check - ensure target volume is not the currently active volume
# Installing to the active volume would overwrite the running system
# -----------------------------------------------------------------------------

- name: "UPGRADE | Get all software volumes"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/software/volume"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 60
  register: bigip_volumes
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "UPGRADE | Set active volume fact"
  ansible.builtin.set_fact:
    bigip_active_volume: >-
      {{ bigip_volumes.json.get('items', [])
         | selectattr('active', 'defined')
         | selectattr('active', 'equalto', true)
         | map(attribute='name')
         | list
         | first
         | default('unknown') }}

- name: "UPGRADE | Display volume info"
  ansible.builtin.debug:
    msg: |
      {{ ansible_host }} volume info:
      Active volume  : {{ bigip_active_volume }}
      Install volume : {{ bigip_install_volume }}

- name: "UPGRADE | FAIL - target volume is the active boot volume"
  ansible.builtin.fail:
    msg: |
      PREFLIGHT FAILED: {{ inventory_hostname }}
      Install volume '{{ bigip_install_volume }}' is the currently active boot volume.
      Installing to the active volume would overwrite the running system.
      Options:
        - Change bigip_install_volume to a different volume (e.g. HD1.2 or HD1.3)
        - Check which volume is available for installation
  when: bigip_active_volume == bigip_install_volume

# -----------------------------------------------------------------------------
# Step 1 - Trigger install+activation
# If EHF is provided use EHF filename - module auto-detects hotfix type
# Both base image AND EHF must already be on BIG-IP /shared/images/
# Socket dies after this call - expected behaviour with httpapi connection
# -----------------------------------------------------------------------------

- name: "UPGRADE | Trigger install and activate - EHF"
  f5networks.f5_bigip.bigip_software_install:
    image: "{{ bigip_ehf_filename }}"
    state: activated
    volume: "{{ bigip_install_volume }}"
  register: bigip_activate_result
  ignore_errors: true
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool
    - bigip_ehf_filename is defined and bigip_ehf_filename != ''

- name: "UPGRADE | Trigger install and activate - standard image"
  f5networks.f5_bigip.bigip_software_install:
    image: "{{ bigip_image_filename }}"
    state: activated
    volume: "{{ bigip_install_volume }}"
  register: bigip_activate_result
  ignore_errors: true
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool
    - bigip_ehf_filename is not defined or bigip_ehf_filename == ''

- name: "UPGRADE | Activation triggered - install starting"
  ansible.builtin.debug:
    msg: >-
      Install triggered on {{ ansible_host }}.
      Pausing 120s to allow install process to get past startup phase
      before polling begins.
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool

# -----------------------------------------------------------------------------
# Step 2 - Pause 120s
# Allows BIG-IP to get past the 0% startup phase where the install
# process can show inconsistent status before settling into normal progress
# -----------------------------------------------------------------------------

- name: "UPGRADE | Pause 120s - waiting for install to pass startup phase"
  ansible.builtin.pause:
    seconds: 120
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool

# -----------------------------------------------------------------------------
# Step 3 - URI poll until complete, rebooting, or unreachable
# Polls every 30s for up to 30 min (60 retries)
# Exit conditions:
#   a. status == 'complete'        - install done, device will reboot soon
#   b. 'restarting' in status      - device already rebooting
#   c. status != 200               - device unreachable, mid-reboot
#   d. exception/connection error  - device dropped off network, mid-reboot
# -----------------------------------------------------------------------------

- name: "UPGRADE | Poll volume {{ bigip_install_volume }} status via URI"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/software/volume/{{ bigip_install_volume }}"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 30
  register: bigip_volume_poll
  delegate_to: localhost
  until: >-
    bigip_volume_poll.status | default(0) != 200 or
    bigip_volume_poll.json.status | default('') == 'complete' or
    'restarting' in (bigip_volume_poll.json.status | default('') | lower)
  retries: 60
  delay: 30
  failed_when: false
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool
  # TROUBLESHOOTING: no_log: true

- name: "UPGRADE | Volume poll result"
  ansible.builtin.debug:
    msg: >-
      Volume {{ bigip_install_volume }}:
      {%- if bigip_volume_poll.status | default(0) != 200 %}
      Device unreachable (HTTP {{ bigip_volume_poll.status | default('none') }}) - mid-reboot
      {%- elif 'restarting' in (bigip_volume_poll.json.status | default('') | lower) %}
      Status: {{ bigip_volume_poll.json.status }} - device is rebooting
      {%- elif bigip_volume_poll.json.status | default('') == 'complete' %}
      Status: complete - device will reboot shortly
      {%- else %}
      Status: {{ bigip_volume_poll.json.status | default('unknown') }}
      {%- endif %}
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool

# -----------------------------------------------------------------------------
# Step 4 - If install completed cleanly, pause for reboot to begin
# Only fires when status == 'complete' (device hasn't rebooted yet)
# Gives BIG-IP time to initiate the reboot before bigip_wait starts probing
# -----------------------------------------------------------------------------

- name: "UPGRADE | Pause 6 min - install complete, waiting for reboot to begin"
  ansible.builtin.pause:
    minutes: 6
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool
    - bigip_volume_poll.json is defined
    - bigip_volume_poll.json.status | default('') == 'complete'

# -----------------------------------------------------------------------------
# Step 5 - Set reboot_triggered, bigip_wait handles the rest
# -----------------------------------------------------------------------------

- name: "UPGRADE | Set reboot_triggered fact"
  ansible.builtin.set_fact:
    bigip_reboot_triggered: true
    cacheable: true
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool

- name: "UPGRADE | Handing off to bigip_wait"
  ansible.builtin.debug:
    msg: "bigip_wait will now poll until {{ ansible_host }} is fully back online."
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool
