---
# =============================================================================
# bigip_upgrade - Image install and activation
# =============================================================================
# Image is already on BIG-IP /shared/images/ verified by bastion_image_push.
#
# Pattern per F5 module documentation:
#   Call 1: state=activated - starts install+activation, returns volume_uri
#   Call 2: volume_uri + timeout - polls until install complete or reboot
#   Pause:  if device is restarting services wait 6 minutes
#   Call 3: volume_uri - check again after reboot if needed
#
# bigip_reboot_triggered is set to true unconditionally after activation
# since state=activated always results in a reboot when not already on target.
# =============================================================================

# -----------------------------------------------------------------------------
# Pre-flight - version check
# -----------------------------------------------------------------------------

- name: "UPGRADE | Check current running version"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/version"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 60
  register: bigip_current_version_check
  delegate_to: localhost
  retries: 10
  delay: 15
  until: bigip_current_version_check.status == 200
  # TROUBLESHOOTING: no_log: true

- name: "UPGRADE | Fail if version check did not succeed"
  ansible.builtin.fail:
    msg: "Could not reach {{ ansible_host }} after 10 retries. Halting upgrade."
  when: bigip_current_version_check.status != 200

- name: "UPGRADE | Set current version fact"
  ansible.builtin.set_fact:
    bigip_current_version: >-
      {{ bigip_current_version_check.json.get('entries', {})
         .get('https://localhost/mgmt/tm/sys/version/0', {})
         .get('nestedStats', {})
         .get('entries', {})
         .get('Version', {})
         .get('description', 'unknown') }}

- name: "UPGRADE | Display current version"
  ansible.builtin.debug:
    msg: "{{ ansible_host }} current version: {{ bigip_current_version }} | target: {{ bigip_target_version }}"

- name: "UPGRADE | Skip if target version already running"
  ansible.builtin.meta: end_host
  when: bigip_current_version is defined and bigip_target_version in bigip_current_version

- name: "UPGRADE | Dry-run mode - skipping install and reboot"
  ansible.builtin.debug:
    msg: "DRY RUN: Would install {{ bigip_image_filename }} to {{ bigip_install_volume }} on {{ ansible_host }}"
  when: bigip_upgrade_dry_run | bool

# -----------------------------------------------------------------------------
# Call 1 - Start activation (returns immediately with volume_uri)
# -----------------------------------------------------------------------------

- name: "UPGRADE | Call 1 - Start install and activate"
  f5networks.f5_bigip.bigip_software_install:
    image: "{{ bigip_image_filename }}"
    state: activated
    volume: "{{ bigip_install_volume }}"
  register: bigip_activate_task
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool

- name: "UPGRADE | Display volume_uri for tracking"
  ansible.builtin.debug:
    msg: "Activation started - tracking via volume_uri: {{ bigip_activate_task.volume_uri | default('n/a') }}"
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool

# -----------------------------------------------------------------------------
# Call 2 - Poll via volume_uri until complete or device restarts services
# timeout: 3600 gives up to 1 hour for installation to complete
# -----------------------------------------------------------------------------

- name: "UPGRADE | Call 2 - Poll installation progress via volume_uri"
  f5networks.f5_bigip.bigip_software_install:
    volume_uri: "{{ bigip_activate_task.volume_uri }}"
    timeout: 3600
  register: bigip_install_progress
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool
    - bigip_activate_task.volume_uri is defined
  ignore_errors: true

- name: "UPGRADE | Display install progress message"
  ansible.builtin.debug:
    msg: "Install progress: {{ bigip_install_progress.message | default('no message') }}"
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool

# -----------------------------------------------------------------------------
# Pause if device is restarting services (rebooting)
# -----------------------------------------------------------------------------

- name: "UPGRADE | Pause 6 minutes - device is restarting services"
  ansible.builtin.pause:
    minutes: 6
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool
    - bigip_install_progress.message is defined
    - "'restarting services' in bigip_install_progress.message"

# -----------------------------------------------------------------------------
# Call 3 - Check again after reboot if device was restarting services
# -----------------------------------------------------------------------------

- name: "UPGRADE | Call 3 - Check installation progress after reboot"
  f5networks.f5_bigip.bigip_software_install:
    volume_uri: "{{ bigip_activate_task.volume_uri }}"
    timeout: 3600
  register: bigip_install_final
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool
    - bigip_activate_task.volume_uri is defined
    - bigip_install_progress.message is defined
    - "'restarting services' in bigip_install_progress.message"
  ignore_errors: true

# -----------------------------------------------------------------------------
# Set reboot_triggered - always true after activation unless dry run
# bigip_wait handles the actual wait for device to come back online
# -----------------------------------------------------------------------------

- name: "UPGRADE | Set reboot_triggered fact"
  ansible.builtin.set_fact:
    bigip_reboot_triggered: true
    cacheable: true
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool

- name: "UPGRADE | Activation triggered - device is rebooting"
  ansible.builtin.debug:
    msg: >-
      Activation triggered on {{ ansible_host }}.
      bigip_wait will now poll until the device is back online.
  when:
    - not bigip_upgrade_dry_run | bool
    - bigip_reboot_after_install | bool
