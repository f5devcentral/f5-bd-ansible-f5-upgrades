---
# Defaults for bastion CIFS paths.
# These are set in group_vars/bastion.yml and can be overridden in extra_vars.
bastion_image_path: "/mnt/cifs/bigip-images"
bigip_remote_image_path: "/shared/images"
bigip_scp_user: "admin"
bigip_scp_port: 22
bigip_scp_opts: "-o StrictHostKeyChecking=no -o BatchMode=yes"
