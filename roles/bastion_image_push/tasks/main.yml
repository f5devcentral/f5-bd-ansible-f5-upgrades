---
# =============================================================================
# bastion_image_push
# =============================================================================
# bastion CIFS --> curl chunked HTTPS POST --> BIG-IP iControl REST API
#
# REQUIREMENT: curl must be installed on the bastion (present on all Linux).
#
# Credentials are written to a temporary .netrc file on the bastion so that
# special characters in passwords are handled safely without shell escaping.
# The .netrc file is removed immediately after the upload completes.
# =============================================================================

- name: "BASTION_PUSH | Verify image exists on bastion CIFS mount"
  ansible.builtin.stat:
    path: "{{ bastion_image_path }}/{{ bigip_image_filename }}"
  register: bastion_image_stat
  delegate_to: bastion
  vars:
    ansible_connection: ssh
  failed_when: not bastion_image_stat.stat.exists

- name: "BASTION_PUSH | Image confirmed on bastion"
  ansible.builtin.debug:
    msg: >-
      Image found: {{ bastion_image_path }}/{{ bigip_image_filename }}
      ({{ (bastion_image_stat.stat.size / 1024 / 1024) | round(1) }} MB)

- name: "BASTION_PUSH | Check if image already registered on BIG-IP"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/software/image"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: bigip_existing_images
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "BASTION_PUSH | Set image_already_present fact"
  ansible.builtin.set_fact:
    bigip_image_already_present: >-
      {{ bigip_existing_images.json['items']
         | default([])
         | selectattr('name', 'defined')
         | selectattr('name', 'equalto', bigip_image_filename)
         | list | length > 0 }}

- name: "BASTION_PUSH | Image already on BIG-IP - skipping upload"
  ansible.builtin.debug:
    msg: "{{ bigip_image_filename }} already registered on {{ inventory_hostname }} - skipping."
  when: bigip_image_already_present | bool

# -----------------------------------------------------------------------------
# Write .netrc file - handles special characters safely, curl reads from file
# so the password never appears in the shell command line or process list
# -----------------------------------------------------------------------------

- name: "BASTION_PUSH | Write temporary .netrc file on bastion"
  ansible.builtin.copy:
    dest: "/tmp/.bigip_netrc_{{ ansible_host }}"
    mode: '0600'
    content: "machine {{ ansible_host }} login {{ ansible_user }} password {{ ansible_password | default(ansible_httpapi_password) }}"
  delegate_to: bastion
  vars:
    ansible_connection: ssh
  when: not bigip_image_already_present | bool
  # TROUBLESHOOTING: no_log: true

- name: "BASTION_PUSH | Upload image to BIG-IP via iControl REST chunked upload"
  ansible.builtin.shell: |
    FILEPATH="{{ bastion_image_path }}/{{ bigip_image_filename }}"
    FILENAME="{{ bigip_image_filename }}"
    HOST="{{ ansible_host }}"
    PORT="{{ bigip_https_port | default(443) }}"
    NETRC="/tmp/.bigip_netrc_{{ ansible_host }}"
    CHUNK_SIZE=524288

    FILESIZE=$(stat -c%s "$FILEPATH")
    CHUNK_NUM=0
    START=0
    TOTAL_CHUNKS=$(( (FILESIZE + CHUNK_SIZE - 1) / CHUNK_SIZE ))

    echo "Uploading ${FILENAME} (${FILESIZE} bytes, ${TOTAL_CHUNKS} chunks)"

    while [ $START -lt $FILESIZE ]; do
      END=$((START + CHUNK_SIZE - 1))
      [ $END -ge $FILESIZE ] && END=$((FILESIZE - 1))
      CHUNK_BYTES=$((END - START + 1))

      HTTP_CODE=$(dd if="$FILEPATH" bs=$CHUNK_SIZE skip=$CHUNK_NUM count=1 2>/dev/null | \
        curl -sk \
          -w "%{http_code}" \
          -o /dev/null \
          --netrc-file "$NETRC" \
          -H "Content-Type: application/octet-stream" \
          -H "Content-Range: bytes ${START}-${END}/${FILESIZE}" \
          -H "Content-Length: ${CHUNK_BYTES}" \
          -H "Connection: keep-alive" \
          --data-binary @- \
          "https://${HOST}:${PORT}/mgmt/shared/file-transfer/uploads/${FILENAME}")

      if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
        echo "ERROR: chunk ${CHUNK_NUM} failed (bytes ${START}-${END}) HTTP ${HTTP_CODE}"
        rm -f "$NETRC"
        exit 1
      fi

      CHUNK_NUM=$((CHUNK_NUM + 1))
      START=$((END + 1))

      if [ $((CHUNK_NUM % 100)) -eq 0 ]; then
        PCT=$((START * 100 / FILESIZE))
        echo "Progress: ${PCT}% (chunk ${CHUNK_NUM}/${TOTAL_CHUNKS})"
      fi
    done

    rm -f "$NETRC"
    echo "Upload complete: ${CHUNK_NUM} chunks, ${FILESIZE} bytes"
  args:
    executable: /bin/bash
  delegate_to: bastion
  vars:
    ansible_connection: ssh
  when: not bigip_image_already_present | bool
  register: bastion_upload_result
  async: 3600
  poll: 30

- name: "BASTION_PUSH | Ensure .netrc file is removed from bastion"
  ansible.builtin.file:
    path: "/tmp/.bigip_netrc_{{ ansible_host }}"
    state: absent
  delegate_to: bastion
  vars:
    ansible_connection: ssh
  when: not bigip_image_already_present | bool

- name: "BASTION_PUSH | Upload complete"
  ansible.builtin.debug:
    msg: "{{ bastion_upload_result.stdout_lines | last | default('Upload complete') }}"
  when: not bigip_image_already_present | bool

- name: "BASTION_PUSH | Poll BIG-IP until image is verified and ready"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/software/image/{{ bigip_image_filename }}"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: bigip_image_verify
  until:
    - bigip_image_verify.status == 200
    - bigip_image_verify.json.status is defined
    - bigip_image_verify.json.status == 'verified'
  retries: 30
  delay: 15
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true
  when: not bigip_image_already_present | bool

- name: "BASTION_PUSH | Image verified and ready on BIG-IP"
  ansible.builtin.debug:
    msg: "{{ bigip_image_filename }} is verified and ready on {{ inventory_hostname }} ({{ ansible_host }})."
