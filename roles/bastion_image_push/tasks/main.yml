---
# =============================================================================
# bastion_image_push
# =============================================================================
# Network topology:
#   bastion CIFS --> rsync --> EE /runner/artifacts/ --> bigip_software_image --> BIG-IP
#
# Flow:
#   1. Verify image exists on bastion CIFS mount
#   2. Check if image already registered on BIG-IP (idempotent - skip if so)
#   3. rsync image from bastion to EE staging dir (streams - no memory buffer)
#   4. Upload from EE to BIG-IP via f5networks.f5_bigip.bigip_software_image
#      (iControl REST chunked HTTPS upload using existing vault credentials)
#   5. Remove EE staging copy to free runner disk space
#   6. Poll BIG-IP REST until image status is 'verified'
# =============================================================================

# -----------------------------------------------------------------------------
# Step 1 - Verify image exists on bastion CIFS mount
# -----------------------------------------------------------------------------

- name: "BASTION_PUSH | Verify image exists on bastion CIFS mount"
  ansible.builtin.stat:
    path: "{{ bastion_image_path }}/{{ bigip_image_filename }}"
  register: bastion_image_stat
  delegate_to: bastion
  vars:
    ansible_connection: ssh
  failed_when: not bastion_image_stat.stat.exists

- name: "BASTION_PUSH | Image confirmed on bastion"
  ansible.builtin.debug:
    msg: >-
      Image found on bastion:
      {{ bastion_image_path }}/{{ bigip_image_filename }}
      ({{ (bastion_image_stat.stat.size / 1024 / 1024) | round(1) }} MB)

# -----------------------------------------------------------------------------
# Step 2 - Check if image already on BIG-IP (skip transfer if so)
# -----------------------------------------------------------------------------

- name: "BASTION_PUSH | Check if image already registered on BIG-IP"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/software/image"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: bigip_existing_images
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "BASTION_PUSH | Set image_already_present fact"
  ansible.builtin.set_fact:
    bigip_image_already_present: >-
      {{ bigip_existing_images.json['items']
         | default([])
         | selectattr('name', 'defined')
         | selectattr('name', 'equalto', bigip_image_filename)
         | list | length > 0 }}

- name: "BASTION_PUSH | Image already on BIG-IP - skipping transfer"
  ansible.builtin.debug:
    msg: "{{ bigip_image_filename }} already registered on {{ inventory_hostname }} - skipping."
  when: bigip_image_already_present | bool

# -----------------------------------------------------------------------------
# Step 3 - rsync image from bastion to EE staging dir
# rsync streams the file over SSH without buffering in memory.
# Runs on the EE (delegate_to: localhost) pulling FROM bastion.
# Uses the existing SSH connection/credentials to bastion.
# async not needed - rsync handles its own streaming.
# -----------------------------------------------------------------------------

- name: "BASTION_PUSH | Ensure EE staging directory exists"
  ansible.builtin.file:
    path: "{{ bigip_ee_staging_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  when: not bigip_image_already_present | bool

- name: "BASTION_PUSH | rsync image from bastion to EE staging dir"
  ansible.builtin.shell: >
    rsync -az --progress
    --rsh="ssh -o StrictHostKeyChecking=no"
    {{ ansible_user }}@{{ hostvars['bastion']['ansible_host'] }}:{{ bastion_image_path }}/{{ bigip_image_filename }}
    {{ bigip_ee_staging_dir }}/{{ bigip_image_filename }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  when: not bigip_image_already_present | bool
  register: rsync_result
  async: 3600
  poll: 30

- name: "BASTION_PUSH | Image synced to EE staging dir"
  ansible.builtin.debug:
    msg: "Image synced to EE: {{ bigip_ee_staging_dir }}/{{ bigip_image_filename }}"
  when: not bigip_image_already_present | bool

# -----------------------------------------------------------------------------
# Step 4 - Upload from EE to BIG-IP via iControl REST
# f5networks.f5_bigip.bigip_software_image runs on the EE (delegate_to: localhost)
# using ansible_user/ansible_password already available from AAP vault credential.
# Chunked HTTPS upload - no SSH to BIG-IP needed.
# -----------------------------------------------------------------------------

- name: "BASTION_PUSH | Upload image from EE to BIG-IP via iControl REST"
  f5networks.f5_bigip.bigip_software_image:
    image: "{{ bigip_ee_staging_dir }}/{{ bigip_image_filename }}"
    state: present
  delegate_to: localhost
  when: not bigip_image_already_present | bool

- name: "BASTION_PUSH | Upload complete"
  ansible.builtin.debug:
    msg: "Upload complete: {{ bigip_image_filename }} -> {{ inventory_hostname }} ({{ ansible_host }})"
  when: not bigip_image_already_present | bool

# -----------------------------------------------------------------------------
# Step 5 - Remove EE staging copy to free runner disk space
# -----------------------------------------------------------------------------

- name: "BASTION_PUSH | Remove image from EE staging dir"
  ansible.builtin.file:
    path: "{{ bigip_ee_staging_dir }}/{{ bigip_image_filename }}"
    state: absent
  delegate_to: localhost
  when: not bigip_image_already_present | bool

# -----------------------------------------------------------------------------
# Step 6 - Poll BIG-IP until image is 'verified'
# -----------------------------------------------------------------------------

- name: "BASTION_PUSH | Poll BIG-IP until image is verified and ready"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/software/image/{{ bigip_image_filename }}"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: bigip_image_verify
  until:
    - bigip_image_verify.status == 200
    - bigip_image_verify.json.status is defined
    - bigip_image_verify.json.status == 'verified'
  retries: 30
  delay: 15
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true
  when: not bigip_image_already_present | bool

- name: "BASTION_PUSH | Image verified and ready on BIG-IP"
  ansible.builtin.debug:
    msg: "{{ bigip_image_filename }} is verified and ready on {{ inventory_hostname }} ({{ ansible_host }})."
