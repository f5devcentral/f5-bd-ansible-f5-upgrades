---
# =============================================================================
# snapshot_pre - Collect baseline state before upgrade
# =============================================================================
# Uses f5networks.f5_bigip.bigip_device_info in two passes:
#   Pass 1: gather_subset: partitions  - get all partition names
#   Pass 2: loop over partitions        - collect VS and pool per partition
# Routes and ARP use bigip_command. HA failover uses uri.
#
# Output: {{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre.json
# =============================================================================

- name: "SNAPSHOT_PRE | Ensure snapshot output directory exists on EE"
  ansible.builtin.file:
    path: "{{ snapshot_output_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost

- name: "SNAPSHOT_PRE | Reset persistent connection to BIG-IP"
  ansible.builtin.meta: reset_connection

# -----------------------------------------------------------------------------
# Pass 1 - Get partition list and system-info/sync-status
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Pass 1 - collect partitions and system info"
  f5networks.f5_bigip.bigip_device_info:
    gather_subset:
      - partitions
      - sync-status
      - system-info
  register: snap_base_info

- name: "SNAPSHOT_PRE | Set partition list fact"
  ansible.builtin.set_fact:
    snap_partition_names: >-
      {{ snap_base_info.partitions | default([]) | map(attribute='name') | list }}

- name: "SNAPSHOT_PRE | Display partitions found"
  ansible.builtin.debug:
    msg: "Partitions found on {{ inventory_hostname }}: {{ snap_partition_names }}"

# -----------------------------------------------------------------------------
# Pass 2 - Collect VS and pools per partition
# Loop over each partition and merge results
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Pass 2 - collect VS and pools per partition"
  f5networks.f5_bigip.bigip_device_info:
    gather_subset:
      - virtual-servers
      - ltm-pools
    partition: "{{ item }}"
  register: snap_per_partition
  loop: "{{ snap_partition_names }}"
  when: snap_partition_names | length > 0

- name: "SNAPSHOT_PRE | Merge VS results across all partitions"
  ansible.builtin.set_fact:
    snap_all_virtual_servers: >-
      {{ snap_per_partition.results
         | selectattr('virtual_servers', 'defined')
         | map(attribute='virtual_servers')
         | flatten }}
  when: snap_partition_names | length > 0

- name: "SNAPSHOT_PRE | Merge pool results across all partitions"
  ansible.builtin.set_fact:
    snap_all_ltm_pools: >-
      {{ snap_per_partition.results
         | selectattr('ltm_pools', 'defined')
         | map(attribute='ltm_pools')
         | flatten }}
  when: snap_partition_names | length > 0

- name: "SNAPSHOT_PRE | Collect AS3 declarations via bigip_device_info (Common returns all tenants)"
  f5networks.f5_bigip.bigip_device_info:
    gather_subset:
      - as3
    partition: Common
  register: snap_as3_info
  ignore_errors: true

- name: "SNAPSHOT_PRE | Write AS3 declarations snapshot file"
  ansible.builtin.copy:
    dest: "{{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre_as3.json"
    content: "{{ as3_snapshot_data | to_nice_json }}"
    mode: '0644'
  vars:
    as3_snapshot_data:
      metadata:
        hostname: "{{ inventory_hostname }}"
        management_ip: "{{ ansible_host }}"
        phase: pre
        timestamp: "{{ snapshot_timestamp }}"
        note: >-
          AS3 declarations from /Common - returns all tenants in one call.
          Represents desired/declared state only.
          For operational status see the pre.json snapshot.
      declaration: "{{ snap_as3_info.ansible_facts.ansible_net_as3_config.declaration | default({}) }}"
  delegate_to: localhost
  when:
    - snap_as3_info is not failed
    - snap_as3_info.ansible_facts is defined
    - snap_as3_info.ansible_facts.ansible_net_as3_config is defined

- name: "SNAPSHOT_PRE | Fallback - empty VS and pool lists if no partitions"
  ansible.builtin.set_fact:
    snap_all_virtual_servers: []
    snap_all_ltm_pools: []
  when: snap_partition_names | length == 0

# -----------------------------------------------------------------------------
# Routes and ARP via bigip_command
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Get route table via tmsh"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "tmsh show /net route"
  register: snap_routes

- name: "SNAPSHOT_PRE | Get ARP table via tmsh"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "tmsh show /net arp all"
  register: snap_arp

# -----------------------------------------------------------------------------
# HA failover state via uri
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Get HA failover state"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/failover/stats"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 60
  register: snap_failover
  delegate_to: localhost
  retries: 5
  delay: 15
  until: snap_failover.status == 200
  # TROUBLESHOOTING: no_log: true

# -----------------------------------------------------------------------------
# Normalise HA state values
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Normalise - HA failover state"
  ansible.builtin.set_fact:
    snap_failover_state: >-
      {{ 'active' if snap_failover.json.get('apiRawValues', {})
         .get('apiAnonymous', '') | lower is search('active')
         else 'standby' }}

- name: "SNAPSHOT_PRE | Normalise - config sync state from module"
  ansible.builtin.set_fact:
    snap_sync_state: >-
      {{ snap_base_info.sync_status | default([]) | first
         | default({}) | json_query('status') | default('unknown') }}

# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# Increase REST framework timeouts before UCS backup
# Required when AS3 or other iAppLX packages are installed
# These packages slow down the REST framework and default timeouts are too low
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Increase iapplxrpm timeout for UCS backup"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "tmsh modify sys db iapplxrpm.timeout value 300"
  when: bigip_snapshot_save_ucs | bool

- name: "SNAPSHOT_PRE | Increase restjavad timeout for UCS backup"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "tmsh modify sys db restjavad.timeout value 300"
  when: bigip_snapshot_save_ucs | bool

- name: "SNAPSHOT_PRE | Increase restnoded timeout for UCS backup"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "tmsh modify sys db restnoded.timeout value 180"
  when: bigip_snapshot_save_ucs | bool

- name: "SNAPSHOT_PRE | Increase icrd timeout for UCS backup"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "tmsh modify sys db icrd.timeout value 180"
  when: bigip_snapshot_save_ucs | bool

- name: "SNAPSHOT_PRE | Save config after timeout changes"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "tmsh save sys config"
  when: bigip_snapshot_save_ucs | bool

- name: "SNAPSHOT_PRE | Restart restjavad and restnoded services"
  f5networks.f5_bigip.bigip_command:
    commands:
      - "run util bash -c 'bigstart restart restjavad restnoded'"
  ignore_errors: true
  when: bigip_snapshot_save_ucs | bool

- name: "SNAPSHOT_PRE | Pause for services to restart"
  ansible.builtin.pause:
    seconds: 60
  when: bigip_snapshot_save_ucs | bool

- name: "SNAPSHOT_PRE | Wait for REST API to be ready after restart"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/shared/echo"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 30
  register: bigip_rest_ready
  until:
    - bigip_rest_ready.status == 200
    - bigip_rest_ready.json.stage is defined
    - bigip_rest_ready.json.stage == 'STARTED'
  retries: 20
  delay: 15
  delegate_to: localhost
  when: bigip_snapshot_save_ucs | bool

- name: "SNAPSHOT_PRE | Reset httpapi connection after service restart"
  ansible.builtin.meta: reset_connection

# -----------------------------------------------------------------------------
# Save UCS backup - two-step pattern per f5networks.f5_bigip documentation
# Step 1: Trigger UCS creation - dest only, returns task_id and src
# Step 2: Poll until complete and download - uses task_id and src from Step 1
# NOTE: AS3 installed significantly increases UCS creation time - known F5 issue
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Step 1 - Trigger UCS creation on BIG-IP"
  f5networks.f5_bigip.bigip_ucs_fetch:
    dest: "/tmp/pre_upgrade_{{ inventory_hostname }}_{{ snapshot_timestamp }}.ucs"
    timeout: "{{ bigip_ucs_timeout | default(1800) }}"
  register: snap_ucs_task
  when: bigip_snapshot_save_ucs | bool

- name: "SNAPSHOT_PRE | Step 1 result"
  ansible.builtin.debug:
    msg: "UCS triggered - task_id={{ snap_ucs_task.task_id | default('n/a') }} src={{ snap_ucs_task.src | default('n/a') }}"
  when: bigip_snapshot_save_ucs | bool

- name: "SNAPSHOT_PRE | Pause before polling UCS task"
  ansible.builtin.pause:
    seconds: 15
  when:
    - bigip_snapshot_save_ucs | bool
    - snap_ucs_task.task_id is defined

- name: "SNAPSHOT_PRE | Step 2 - Poll until UCS complete and download to EE"
  f5networks.f5_bigip.bigip_ucs_fetch:
    dest: "/tmp/pre_upgrade_{{ inventory_hostname }}_{{ snapshot_timestamp }}.ucs"
    src: "{{ snap_ucs_task.src }}"
    task_id: "{{ snap_ucs_task.task_id }}"
    timeout: "{{ bigip_ucs_timeout | default(1800) }}"
  register: snap_ucs_save
  when:
    - bigip_snapshot_save_ucs | bool
    - snap_ucs_task.task_id is defined

- name: "SNAPSHOT_PRE | Copy UCS from tmp to snapshot output dir"
  ansible.builtin.copy:
    src: "/tmp/pre_upgrade_{{ inventory_hostname }}_{{ snapshot_timestamp }}.ucs"
    dest: "{{ snapshot_output_dir }}/pre_upgrade_{{ inventory_hostname }}_{{ snapshot_timestamp }}.ucs"
    remote_src: false
    mode: '0644'
  delegate_to: localhost
  when:
    - bigip_snapshot_save_ucs | bool
    - snap_ucs_save is not failed

- name: "SNAPSHOT_PRE | Confirm UCS downloaded to EE"
  ansible.builtin.stat:
    path: "{{ snapshot_output_dir }}/pre_upgrade_{{ inventory_hostname }}_{{ snapshot_timestamp }}.ucs"
  register: ucs_stat_check
  delegate_to: localhost
  when: bigip_snapshot_save_ucs | bool

- name: "SNAPSHOT_PRE | UCS download confirmed"
  ansible.builtin.debug:
    msg: "UCS saved to EE: {{ snapshot_output_dir }}/pre_upgrade_{{ inventory_hostname }}_{{ snapshot_timestamp }}.ucs ({{ ucs_stat_check.stat.size | default(0) | filesizeformat }})"
  when:
    - bigip_snapshot_save_ucs | bool
    - ucs_stat_check.stat.exists | default(false)

- name: "SNAPSHOT_PRE | WARNING - UCS file not found on EE after fetch"
  ansible.builtin.debug:
    msg: "WARNING: UCS fetch may have failed for {{ inventory_hostname }} - file not found on EE at {{ snapshot_output_dir }}/pre_upgrade_{{ inventory_hostname }}_{{ snapshot_timestamp }}.ucs"
  when:
    - bigip_snapshot_save_ucs | bool
    - not ucs_stat_check.stat.exists | default(false)

# -----------------------------------------------------------------------------
# Write pre-snapshot JSON
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Write pre-snapshot JSON file"
  ansible.builtin.copy:
    dest: "{{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre.json"
    content: "{{ snapshot_pre_data | to_nice_json }}"
    mode: '0644'
  vars:
    snapshot_pre_data:
      metadata:
        hostname: "{{ inventory_hostname }}"
        management_ip: "{{ ansible_host }}"
        phase: pre
        timestamp: "{{ snapshot_timestamp }}"
        version: "{{ snap_base_info.system_info.product_version | default('unknown') }}"
        platform: "{{ snap_base_info.system_info.platform | default('unknown') }}"
        marketing_name: "{{ snap_base_info.system_info.marketing_name | default('unknown') }}"
        chassis_serial: "{{ snap_base_info.system_info.chassis_serial | default('unknown') }}"
        ha_failover_state: "{{ snap_failover_state }}"
        sync_state: "{{ snap_sync_state }}"
        partitions: "{{ snap_partition_names }}"
        ucs_saved: "{{ bigip_snapshot_save_ucs | bool }}"
        ucs_name: >-
          {{ 'pre_upgrade_' + inventory_hostname + '_' + snapshot_timestamp
             if bigip_snapshot_save_ucs | bool else 'not_saved' }}
      virtual_servers: "{{ snap_all_virtual_servers | default([]) }}"
      ltm_pools: "{{ snap_all_ltm_pools | default([]) }}"
      routes: >-
          {{ snap_routes.stdout_lines[0] | default([]) | reject('match', '^-+$') | reject('match', '^Net::') | reject('match', '^Name\s') | reject('match', '^\s*$') | list }}
      arp: >-
          {{ snap_arp.stdout_lines[0] | default([]) | reject('match', '^-+$') | reject('match', '^Net::') | reject('match', '^Name\s') | reject('match', '^\s*$') | list }}
  delegate_to: localhost

- name: "SNAPSHOT_PRE | Summary"
  ansible.builtin.debug:
    msg: >-
      Pre-snapshot complete for {{ inventory_hostname }} |
      Version: {{ snap_base_info.system_info.product_version | default('unknown') }} |
      HA state: {{ snap_failover_state }} |
      Sync: {{ snap_sync_state }} |
      Partitions: {{ snap_partition_names | length }} |
      VS count: {{ snap_all_virtual_servers | default([]) | length }} |
      Pool count: {{ snap_all_ltm_pools | default([]) | length }} |
      File: {{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre.json
