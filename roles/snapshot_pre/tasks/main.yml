---
# =============================================================================
# snapshot_pre - Collect baseline state before upgrade
# =============================================================================
# Captures: virtual server status, pool member health, route table,
#           ARP table, software version, HA failover state, sync state
# Output: {{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre.json
#
# Response format notes (varies by BIG-IP version):
#   /mgmt/tm/sys/failover/stats  -> apiRawValues.apiAnonymous plain text string
#   /mgmt/tm/cm/sync-status/stats -> nestedStats on most versions, apiRawValues on some
#   /mgmt/tm/sys/version         -> nestedStats consistently across versions
#   /mgmt/tm/ltm/virtual/stats   -> nestedStats per-VS entries
#   /mgmt/tm/ltm/pool/stats      -> nestedStats per-pool entries
# =============================================================================

- name: "SNAPSHOT_PRE | Ensure snapshot output directory exists on EE"
  ansible.builtin.file:
    path: "{{ snapshot_output_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: false

# -----------------------------------------------------------------------------
# Collect raw data via iControl REST
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Get virtual server status"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/ltm/virtual/stats"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: snap_virtual_servers
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "SNAPSHOT_PRE | Get pool member status"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/ltm/pool/stats"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: snap_pools
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "SNAPSHOT_PRE | Get route table"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/net/route"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: snap_routes
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "SNAPSHOT_PRE | Get ARP table"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/net/arp/stats"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: snap_arp
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "SNAPSHOT_PRE | Get software version"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/version"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: snap_version
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "SNAPSHOT_PRE | Get HA failover state"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/failover/stats"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: snap_failover
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "SNAPSHOT_PRE | Get config sync state"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/cm/sync-status/stats"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: snap_sync
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

# -----------------------------------------------------------------------------
# Normalise response values
# Each REST endpoint may return nestedStats.entries OR apiRawValues.apiAnonymous
# depending on BIG-IP version. Normalise here into plain string facts so
# the rest of the role never needs to care about the raw structure.
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Normalise - software version"
  ansible.builtin.set_fact:
    snap_version_str: >-
      {{ snap_version.json.get('entries', {})
         .get('https://localhost/mgmt/tm/sys/version/0', {})
         .get('nestedStats', {})
         .get('entries', {})
         .get('Version', {})
         .get('description', 'unknown') }}

- name: "SNAPSHOT_PRE | Normalise - HA failover state"
  # failover/stats returns apiRawValues.apiAnonymous: "Failover active for 0d 03:25:49"
  # Parse 'active' or 'standby' out of the plain text string.
  ansible.builtin.set_fact:
    snap_failover_state: >-
      {{ 'active' if snap_failover.json.get('apiRawValues', {})
         .get('apiAnonymous', '') | lower is search('active')
         else 'standby' }}

- name: "SNAPSHOT_PRE | Normalise - config sync state"
  # Key confirmed: https://localhost/mgmt/tm/cm/sync-status/0/stats
  ansible.builtin.set_fact:
    snap_sync_state: >-
      {{ snap_sync.json.get('entries', {})
         .get('https://localhost/mgmt/tm/cm/sync-status/0/stats', {})
         .get('nestedStats', {})
         .get('entries', {})
         .get('status', {})
         .get('description', 'unknown') }}

# -----------------------------------------------------------------------------
# Save UCS backup on device (stored locally on BIG-IP for later fetch)
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Save and fetch UCS backup from BIG-IP to EE"
  f5networks.f5_bigip.bigip_ucs_fetch:
    src: "pre_upgrade_{{ inventory_hostname }}_{{ snapshot_timestamp }}"
    dest: "{{ snapshot_output_dir }}/"
    create_on_missing: true
    fail_on_missing: false
  register: snap_ucs_save
  when: bigip_snapshot_save_ucs | bool

# -----------------------------------------------------------------------------
# Write pre-snapshot JSON
# -----------------------------------------------------------------------------

- name: "SNAPSHOT_PRE | Write pre-snapshot JSON file"
  ansible.builtin.copy:
    dest: "{{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre.json"
    content: "{{ snapshot_pre_data | to_nice_json }}"
    mode: '0644'
  vars:
    snapshot_pre_data:
      metadata:
        hostname: "{{ inventory_hostname }}"
        management_ip: "{{ ansible_host }}"
        phase: pre
        timestamp: "{{ snapshot_timestamp }}"
        version: "{{ snap_version_str }}"
        ha_failover_state: "{{ snap_failover_state }}"
        sync_state: "{{ snap_sync_state }}"
        ucs_saved: "{{ bigip_snapshot_save_ucs | bool }}"
        ucs_name: >-
          {{ 'pre_upgrade_' + inventory_hostname + '_' + snapshot_timestamp
             if bigip_snapshot_save_ucs | bool else 'not_saved' }}
      virtual_servers: "{{ snap_virtual_servers.json.entries | default({}) }}"
      pools: "{{ snap_pools.json.entries | default({}) }}"
      routes: "{{ snap_routes.json['items'] | default([]) }}"
      arp: "{{ snap_arp.json.entries | default({}) }}"
  delegate_to: localhost

- name: "SNAPSHOT_PRE | Summary"
  ansible.builtin.debug:
    msg: >-
      Pre-snapshot complete for {{ inventory_hostname }} |
      Version: {{ snap_version_str }} |
      HA state: {{ snap_failover_state }} |
      Sync: {{ snap_sync_state }} |
      File: {{ snapshot_output_dir }}/{{ inventory_hostname }}_{{ snapshot_timestamp }}_pre.json
