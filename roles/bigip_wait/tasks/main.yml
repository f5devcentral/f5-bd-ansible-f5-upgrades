---
# =============================================================================
# bigip_wait - Layered post-reboot readiness for BIG-IP
# =============================================================================
# All wait tasks run on the Ansible controller (delegate_to: localhost)
# because the httpapi connection to the device is dead during reboot.
# The controller polls the device's management IP directly over TCP/HTTPS.
#
# Only runs if bigip_reboot_triggered is true.
#
# Layer sequence:
#   1. Initial delay    - let the reboot actually start before probing
#   2. SSH port check   - if already up, skip down/up layers (device came
#                         back during install pause)
#   3. SSH port down    - confirm reboot began (skipped if already up)
#   4. SSH port up      - kernel + sshd running (skipped if already up)
#   5. HTTPS port up    - nginx/httpd stack is listening
#   6. REST echo        - /mgmt/shared/echo returns {"stage":"STARTED"}
#   7. mcpd ready       - /mgmt/tm/sys/version responds
#   8. Deep validation  - LTM config loaded, HA sync-status aware
# =============================================================================

- name: "WAIT | Skip - reboot was not triggered (dry run or reboot disabled)"
  ansible.builtin.meta: end_host
  when: not bigip_reboot_triggered | default(false) | bool

- name: "WAIT | Initial delay - allow reboot to begin"
  ansible.builtin.wait_for:
    timeout: "{{ bigip_reboot_initial_delay }}"
  delegate_to: localhost

# -----------------------------------------------------------------------------
# Check if device is already back online before running port down/up layers
# If the 6 min pause in bigip_upgrade was enough for a full reboot cycle,
# the SSH port will already be up - skip straight to HTTPS/REST checks
# -----------------------------------------------------------------------------

- name: "WAIT | Check if SSH port is already up"
  ansible.builtin.wait_for:
    host: "{{ bigip_wait_host }}"
    port: "{{ bigip_ssh_port }}"
    state: started
    timeout: 5
    sleep: 1
  register: bigip_ssh_already_up
  delegate_to: localhost
  ignore_errors: true

- name: "WAIT | Device already back online - skipping port down/up layers"
  ansible.builtin.debug:
    msg: >-
      SSH port already up on {{ bigip_wait_host }} - device came back during
      the install pause. Skipping Layers 1 and 2, proceeding to REST checks.
  when: bigip_ssh_already_up is not failed

- name: "WAIT | Layer 1 - wait for SSH port to go DOWN (reboot started)"
  ansible.builtin.wait_for:
    host: "{{ bigip_wait_host }}"
    port: "{{ bigip_ssh_port }}"
    state: stopped
    timeout: 300
    sleep: 5
  delegate_to: localhost
  ignore_errors: true
  when: bigip_ssh_already_up is failed

- name: "WAIT | Layer 2 - wait for SSH port to come UP (kernel running)"
  ansible.builtin.wait_for:
    host: "{{ bigip_wait_host }}"
    port: "{{ bigip_ssh_port }}"
    state: started
    timeout: 600
    sleep: 10
  delegate_to: localhost
  when: bigip_ssh_already_up is failed

- name: "WAIT | Layer 3 - wait for HTTPS port to come UP (web stack running)"
  ansible.builtin.wait_for:
    host: "{{ bigip_wait_host }}"
    port: "{{ bigip_https_port }}"
    state: started
    timeout: 300
    sleep: 10
  delegate_to: localhost

- name: "WAIT | Layer 4 - poll /mgmt/shared/echo until REST framework ready"
  ansible.builtin.uri:
    url: "https://{{ bigip_wait_host }}:{{ bigip_https_port }}/mgmt/shared/echo"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    return_content: true
    timeout: 30
  register: bigip_rest_echo
  until:
    - bigip_rest_echo.status == 200
    - bigip_rest_echo.json is defined
    - bigip_rest_echo.json.stage is defined
    - bigip_rest_echo.json.stage == "STARTED"
  retries: "{{ bigip_wait_max_retries }}"
  delay: "{{ bigip_wait_retry_delay }}"
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "WAIT | Layer 5 - poll /mgmt/tm/sys/version until mcpd ready"
  ansible.builtin.uri:
    url: "https://{{ bigip_wait_host }}:{{ bigip_https_port }}/mgmt/tm/sys/version"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 30
  register: bigip_version_check
  until: bigip_version_check.status == 200
  retries: "{{ bigip_wait_max_retries }}"
  delay: "{{ bigip_wait_retry_delay }}"
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "WAIT | Layer 5 result - post-reboot version"
  ansible.builtin.debug:
    msg: >-
      {{ bigip_wait_host }} mcpd ready.
      Version: {{ bigip_version_check.json.get('entries', {})
        .get('https://localhost/mgmt/tm/sys/version/0', {})
        .get('nestedStats', {})
        .get('entries', {})
        .get('Version', {})
        .get('description', 'unknown') }}

- name: "WAIT | Layer 6 - poll /mgmt/tm/ltm/virtual until LTM config loaded"
  ansible.builtin.uri:
    url: "https://{{ bigip_wait_host }}:{{ bigip_https_port }}/mgmt/tm/ltm/virtual"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 30
  register: bigip_ltm_check
  until:
    - bigip_ltm_check.status == 200
    - bigip_ltm_check.json is defined
    - bigip_ltm_check.json.kind is defined
  retries: "{{ bigip_wait_max_retries }}"
  delay: "{{ bigip_wait_retry_delay }}"
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "WAIT | Layer 6 - poll /mgmt/tm/cm/sync-status until HA aware"
  ansible.builtin.uri:
    url: "https://{{ bigip_wait_host }}:{{ bigip_https_port }}/mgmt/tm/cm/sync-status/stats"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 30
  register: bigip_ha_check
  until:
    - bigip_ha_check.status == 200
    - bigip_ha_check.json is defined
    - bigip_ha_check.json.get('entries', {})
        .get('https://localhost/mgmt/tm/cm/sync-status/0/stats', {})
        .get('nestedStats', {})
        .get('entries', {})
        .get('status', {})
        .get('description', '') | length > 0
  retries: "{{ bigip_wait_max_retries }}"
  delay: "{{ bigip_wait_retry_delay }}"
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true

- name: "WAIT | Layer 6 result - HA sync status"
  ansible.builtin.set_fact:
    bigip_post_reboot_sync_state: >-
      {{ bigip_ha_check.json.get('entries', {})
         .get('https://localhost/mgmt/tm/cm/sync-status/0/stats', {})
         .get('nestedStats', {})
         .get('entries', {})
         .get('status', {})
         .get('description', 'unknown') }}

- name: "WAIT | Layer 6 - poll sync status until not offline (max 5 min)"
  ansible.builtin.uri:
    url: "https://{{ bigip_wait_host }}:{{ bigip_https_port }}/mgmt/tm/cm/sync-status/stats"
    method: GET
    user: "{{ ansible_user }}"
    password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    timeout: 30
  register: bigip_offline_recheck
  until: >-
    bigip_offline_recheck.json.get('entries', {})
    .get('https://localhost/mgmt/tm/cm/sync-status/0/stats', {})
    .get('nestedStats', {})
    .get('entries', {})
    .get('status', {})
    .get('description', 'unknown') | lower != 'offline'
  retries: 15
  delay: 20
  delegate_to: localhost
  # TROUBLESHOOTING: no_log: true
  when: bigip_post_reboot_sync_state | lower == 'offline'

- name: "WAIT | Update sync state fact after offline recheck"
  ansible.builtin.set_fact:
    bigip_post_reboot_sync_state: >-
      {{ bigip_offline_recheck.json.get('entries', {})
         .get('https://localhost/mgmt/tm/cm/sync-status/0/stats', {})
         .get('nestedStats', {})
         .get('entries', {})
         .get('status', {})
         .get('description', 'unknown') }}
  when: bigip_post_reboot_sync_state | lower == 'offline'

- name: "WAIT | Device fully ready"
  ansible.builtin.debug:
    msg: >-
      {{ bigip_wait_host }} is fully ready.
      Version: {{ bigip_version_check.json.get('entries', {})
        .get('https://localhost/mgmt/tm/sys/version/0', {})
        .get('nestedStats', {})
        .get('entries', {})
        .get('Version', {})
        .get('description', 'unknown') }} |
      LTM: loaded |
      HA sync state: {{ bigip_post_reboot_sync_state }}
