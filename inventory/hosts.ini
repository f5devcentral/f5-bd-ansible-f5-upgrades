# f5-bd-ansible-f5-upgrades - Example Inventory
# Credentials must come from AAP Machine Credentials - never store plaintext here.

# =============================================================================
# Bastion Host
# =============================================================================
# The bastion serves as:
#   1. Image staging - CIFS share mounted, SCPs BIG-IP ISOs to devices
#   2. Backup storage - snapshot JSON diffs and UCS backups stored here
#
# In AAP: create a Machine Credential for lab_admin and associate it with
# the Job Template. ansible_user/password/become_password come from there.
# =============================================================================
[bastion]
bastion01 ansible_host=192.170.7.50

# =============================================================================
# BIG-IP - Standalone Devices
# =============================================================================
[bigip_standalone]
bigip-standalone-01 ansible_host=192.168.1.10

# =============================================================================
# BIG-IP - HA Pairs
# ha_role is a hint only - Play 0 queries live state and overrides it.
# =============================================================================
[bigip_ha_pair01]
bigip-ha-pair01-active  ansible_host=192.168.1.20 ha_role=active
bigip-ha-pair01-standby ansible_host=192.168.1.21 ha_role=standby

[bigip_ha_pair02]
bigip-ha-pair02-active  ansible_host=192.168.1.22 ha_role=active
bigip-ha-pair02-standby ansible_host=192.168.1.23 ha_role=standby

[bigip_ha:children]
bigip_ha_pair01
bigip_ha_pair02

[bigip:children]
bigip_standalone
bigip_ha

# =============================================================================
# F5OS - rSeries Appliances
# =============================================================================
[f5os_rseries]
rseries-r2600-01 ansible_host=192.168.2.10
rseries-r4600-01 ansible_host=192.168.2.11

# =============================================================================
# F5OS - Velos Chassis
# =============================================================================
[f5os_velos_controller]
velos-chassis-01-ctrl ansible_host=192.168.3.10

[f5os_velos_partition]
velos-chassis-01-part1 ansible_host=192.168.3.20

[f5os_velos:children]
f5os_velos_controller
f5os_velos_partition

[f5os:children]
f5os_rseries
f5os_velos

# =============================================================================
# Group connection vars
# Credentials omitted - set via AAP Machine Credential per group
# =============================================================================
[bigip:vars]
ansible_user=admin
ansible_httpapi_port=443
ansible_httpapi_use_ssl=true
ansible_httpapi_validate_certs=false
ansible_connection=httpapi
ansible_network_os=f5networks.f5_bigip.bigip

[f5os_rseries:vars]
ansible_user=admin
ansible_httpapi_port=443
ansible_httpapi_use_ssl=true
ansible_httpapi_validate_certs=false
ansible_connection=httpapi
ansible_network_os=f5networks.f5os.f5os

[f5os_velos_controller:vars]
ansible_user=admin
ansible_httpapi_port=443
ansible_httpapi_use_ssl=true
ansible_httpapi_validate_certs=false
ansible_connection=httpapi
ansible_network_os=f5networks.f5os.f5os

[f5os_velos_partition:vars]
ansible_user=admin
ansible_httpapi_port=443
ansible_httpapi_use_ssl=true
ansible_httpapi_validate_certs=false
ansible_connection=httpapi
ansible_network_os=f5networks.f5os.f5os
