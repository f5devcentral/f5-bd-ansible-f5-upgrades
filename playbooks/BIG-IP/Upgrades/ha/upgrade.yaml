---
# =============================================================================
# BIG-IP HA Pair Upgrade Playbook
# =============================================================================
# Upgrade order:
#   0. Pre-flight    - validate extra_vars, detect live ha_role, set timestamps
#   1. Image staging - bastion CIFS -> SCP -> both BIG-IP units
#   2. Pre-snapshot  - both units (JSON written to EE runner)
#   3. Upgrade standby  -> reboot -> layered wait -> verify standby clean
#   4. Force failover   (standby becomes active)
#   5. Upgrade old-active (now standby) -> reboot -> layered wait
#   6. Optional failback
#   7. Final post-snapshot + diff report (both units)
#   8. Store all artifacts on bastion (JSON diffs + UCS)
#
# AAP 2.6 Setup:
#   Project    : f5-bd-ansible-f5-upgrades
#   Playbook   : playbooks/BIG-IP/Upgrades/ha/upgrade.yaml
#   Inventory  : [bigip_ha] group with device hosts only - NO bastion entry needed
#   Credential : AAP Machine Credential for BIG-IP devices
#   Extra Vars : paste contents of extra_vars/upgrade_vars.yml and update values
#
# Network topology:
#   bastion  <-- SSH -->  AAP EE  <-- SSH/HTTPS -->  BIG-IP
#   bastion has NO direct path to BIG-IP. All transfers route through the EE.
#   Image:  bastion CIFS -> EE (fetch) -> BIG-IP (SCP from EE)
#   Backup: BIG-IP -> EE (bigip_ucs_fetch) -> bastion CIFS (copy from EE)
#
# bastion01 is a standalone host in AAP inventory (no group).
# Its credentials come from the AAP Machine Credential.
# extra_vars supply CIFS paths and upgrade parameters only.
# =============================================================================


# =============================================================================
# PLAY 0 - Pre-flight: validate extra_vars, detect live HA role, set timestamps
# =============================================================================
- name: "BIG-IP HA Upgrade - Play 0: Pre-flight Checks & HA Role Detection"
  hosts: "{{ target_hosts | default('bigip_ha') }}"
  gather_facts: false
  vars:
    _snapshot_timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
    _backup_date: "{{ lookup('pipe', 'date +%Y-%m-%d') }}"
  tasks:

    - name: "PREFLIGHT | Validate required extra vars are set"
      ansible.builtin.fail:
        msg: "Missing required extra var: '{{ item }}' - set it in AAP Extra Variables."
      when: vars[item] is not defined or vars[item] | string | length == 0
      loop:
        - bigip_target_version
        - bigip_image_filename
        - bastion_image_path
        - bastion_backup_root
      delegate_to: localhost
      run_once: false

    - name: "PREFLIGHT | Query live failover state from device"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/failover/stats"
        method: GET
        user: "{{ ansible_user }}"
        password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
      register: preflight_failover_query
      delegate_to: localhost
      # TROUBLESHOOTING: no_log: true

    - name: "PREFLIGHT | Set ha_role fact from live device state"
      # BIG-IP returns failover state in apiRawValues.apiAnonymous as a plain
      # text string: "Failover active for 0d 03:25:49" or "Failover standby"
      # We search for the word 'active' in that string to determine the role.
      ansible.builtin.set_fact:
        ha_role: >-
          {{ 'active' if preflight_failover_query.json.apiRawValues.apiAnonymous
             | default('') | lower is search('active')
             else 'standby' }}
        cacheable: true

    - name: "PREFLIGHT | Query config sync state"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/cm/sync-status/stats"
        method: GET
        user: "{{ ansible_user }}"
        password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
      register: preflight_sync_query
      delegate_to: localhost
      # TROUBLESHOOTING: no_log: true

    - name: "PREFLIGHT | Set sync state fact"
      # sync-status/stats uses nestedStats.entries.status.description
      # Key confirmed: https://localhost/mgmt/tm/cm/sync-status/0/stats
      ansible.builtin.set_fact:
        bigip_sync_state: >-
          {{ preflight_sync_query.json.get('entries', {})
             .get('https://localhost/mgmt/tm/cm/sync-status/0/stats', {})
             .get('nestedStats', {})
             .get('entries', {})
             .get('status', {})
             .get('description', 'unknown') }}
        cacheable: true

    - name: "PREFLIGHT | Query current software version"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/version"
        method: GET
        user: "{{ ansible_user }}"
        password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
      register: preflight_version_query
      delegate_to: localhost
      # TROUBLESHOOTING: no_log: true

    - name: "PREFLIGHT | Parse version from query response"
      ansible.builtin.set_fact:
        bigip_current_version: >-
          {{ preflight_version_query.json.get('entries', {})
             .get('https://localhost/mgmt/tm/sys/version/0', {})
             .get('nestedStats', {})
             .get('entries', {})
             .get('Version', {})
             .get('description', 'unknown') }}

    # -------------------------------------------------------------------------
    # Split-brain detection
    # A split-brain occurs when a previous upgrade run was interrupted mid-way
    # leaving one node on the new version and one on the old version.
    # In this state sync will not be 'In Sync' due to version mismatch.
    # We detect this by checking:
    #   - Sync is NOT In Sync (expected in split-brain)
    #   - This node is already on the target version (already upgraded)
    # If detected: mark node as already_upgraded so downstream plays skip it.
    # If out of sync for any other reason: abort as normal.
    # -------------------------------------------------------------------------

    - name: "PREFLIGHT | Detect split-brain - this node already on target version"
      ansible.builtin.set_fact:
        bigip_already_upgraded: >-
          {{ bigip_target_version in bigip_current_version }}
        cacheable: true

    - name: "PREFLIGHT | Split-brain detected - this node already upgraded"
      ansible.builtin.debug:
        msg: >-
          SPLIT-BRAIN DETECTED: {{ inventory_hostname }} is already running
          {{ bigip_current_version }} (target: {{ bigip_target_version }}).
          Sync state is '{{ bigip_sync_state }}' due to version mismatch.
          This node will be skipped - upgrade will continue on the other node.
      when:
        - bigip_sync_state != 'In Sync'
        - bigip_already_upgraded | bool
        - not bigip_upgrade_dry_run | default(false) | bool

    - name: "PREFLIGHT | Abort if out of sync for non-split-brain reason"
      ansible.builtin.fail:
        msg: >-
          PREFLIGHT FAILED: {{ inventory_hostname }} sync state is '{{ bigip_sync_state }}'.
          This is not a split-brain condition (version {{ bigip_current_version }}
          does not match target {{ bigip_target_version }}).
          Resolve sync issues manually and re-run.
      when:
        - bigip_sync_state != 'In Sync'
        - not bigip_already_upgraded | bool
        - not bigip_upgrade_dry_run | default(false) | bool

    - name: "PREFLIGHT | Cache snapshot_timestamp and backup_date across all plays"
      ansible.builtin.set_fact:
        snapshot_timestamp: "{{ _snapshot_timestamp }}"
        backup_date: "{{ _backup_date }}"
        cacheable: true

    - name: "PREFLIGHT | Summary"
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} ({{ ansible_host }}) |
          HA role: {{ ha_role }} |
          Version: {{ bigip_current_version }} |
          Target: {{ bigip_target_version }} |
          Sync: {{ bigip_sync_state }} |
          Already upgraded: {{ bigip_already_upgraded | bool }} |
          Timestamp: {{ snapshot_timestamp }}


# =============================================================================
# PLAY 1 - Image staging: bastion CIFS -> SCP -> both BIG-IP units
# =============================================================================
- name: "BIG-IP HA Upgrade - Play 1: Stage Image on Both Units via Bastion"
  hosts: "{{ target_hosts | default('bigip_ha') }}"
  gather_facts: false
  roles:
    - role: bastion_image_push
  tags: [image, image_push]


# =============================================================================
# PLAY 2 - Pre-snapshot: both units
# =============================================================================
- name: "BIG-IP HA Upgrade - Play 2: Pre-Snapshot (Both Units)"
  hosts: "{{ target_hosts | default('bigip_ha') }}"
  gather_facts: false
  roles:
    - role: snapshot_pre
  tags: [snapshot, pre_snapshot]


# =============================================================================
# PLAY 3 - Upgrade standby unit
# =============================================================================
- name: "BIG-IP HA Upgrade - Play 3: Upgrade Standby Unit"
  hosts: "{{ target_hosts | default('bigip_ha') }}"
  gather_facts: false
  pre_tasks:
    - name: "Skip - this host is not the standby"
      ansible.builtin.meta: end_host
      when: ha_role | default('unknown') != 'standby'

    - name: "Skip - this host is already on target version"
      ansible.builtin.meta: end_host
      when: bigip_already_upgraded | default(false) | bool

    - name: "UPGRADE STANDBY | Confirm identity"
      ansible.builtin.debug:
        msg: "Upgrading STANDBY: {{ inventory_hostname }} ({{ ansible_host }})"
  roles:
    - role: bigip_upgrade
    - role: bigip_wait
  tags: [upgrade, upgrade_standby]


# =============================================================================
# PLAY 4 - Verify standby came back clean before proceeding to failover
# =============================================================================
- name: "BIG-IP HA Upgrade - Play 4: Verify Standby Came Back Clean"
  hosts: "{{ target_hosts | default('bigip_ha') }}"
  gather_facts: false
  pre_tasks:
    - name: "Skip - this host is not the standby"
      ansible.builtin.meta: end_host
      when: ha_role | default('unknown') != 'standby'

    - name: "Skip - standby already on target version, no verification needed"
      ansible.builtin.meta: end_host
      when: bigip_already_upgraded | default(false) | bool
  roles:
    - role: snapshot_post
    - role: snapshot_report
  tags: [snapshot, post_snapshot_standby]


# =============================================================================
# PLAY 5 - Force failover: active yields to upgraded standby
# =============================================================================
- name: "BIG-IP HA Upgrade - Play 5: Force Failover to Upgraded Standby"
  hosts: "{{ target_hosts | default('bigip_ha') }}"
  gather_facts: false
  pre_tasks:
    - name: "Skip - this host is not the active unit"
      ansible.builtin.meta: end_host
      when: ha_role | default('unknown') != 'active'
  tasks:
    - name: "FAILOVER | Trigger failover via REST API"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/failover"
        method: POST
        user: "{{ ansible_user }}"
        password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          command: run
          standby: true
        # -1 catches the connection drop that happens immediately on failover
        status_code: [200, 202, -1]
      delegate_to: localhost
      ignore_errors: true
      when: not bigip_upgrade_dry_run | default(false) | bool
      # TROUBLESHOOTING: no_log: true

    - name: "FAILOVER | Dry-run - skipping"
      ansible.builtin.debug:
        msg: "DRY RUN: Would trigger failover on {{ inventory_hostname }}"
      when: bigip_upgrade_dry_run | default(false) | bool

    - name: "FAILOVER | Pause 30s for failover to settle"
      ansible.builtin.pause:
        seconds: 30
      when: not bigip_upgrade_dry_run | default(false) | bool

    - name: "FAILOVER | Confirm new HA state"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/failover/stats"
        method: GET
        user: "{{ ansible_user }}"
        password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
      register: post_failover_state
      delegate_to: localhost
      # TROUBLESHOOTING: no_log: true
      when: not bigip_upgrade_dry_run | default(false) | bool

    - name: "FAILOVER | Display new state"
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} post-failover state: {{ post_failover_state.json.apiRawValues.apiAnonymous
             | default('unknown') | trim }}
      when: not bigip_upgrade_dry_run | default(false) | bool
  tags: [upgrade, failover]


# =============================================================================
# PLAY 6 - Upgrade old-active (now standby after failover)
# =============================================================================
- name: "BIG-IP HA Upgrade - Play 6: Upgrade Old-Active (Now Standby)"
  hosts: "{{ target_hosts | default('bigip_ha') }}"
  gather_facts: false
  pre_tasks:
    - name: "Skip - this host is not the original active"
      ansible.builtin.meta: end_host
      when: ha_role | default('unknown') != 'active'

    - name: "Skip - this host is already on target version"
      ansible.builtin.meta: end_host
      when: bigip_already_upgraded | default(false) | bool

    - name: "UPGRADE ACTIVE | Confirm identity"
      ansible.builtin.debug:
        msg: >-
          Upgrading original ACTIVE (now standby after failover):
          {{ inventory_hostname }} ({{ ansible_host }})
  roles:
    - role: bigip_upgrade
    - role: bigip_wait
  tags: [upgrade, upgrade_active]


# =============================================================================
# PLAY 7 - Optional failback to original active
# =============================================================================
- name: "BIG-IP HA Upgrade - Play 7: Optional Failback to Original Active"
  hosts: "{{ target_hosts | default('bigip_ha') }}"
  gather_facts: false
  pre_tasks:
    - name: "Skip - failback not requested"
      ansible.builtin.meta: end_host
      when: not bigip_failback | default(false) | bool

    - name: "Skip - this host is not the original standby (now active)"
      ansible.builtin.meta: end_host
      when: ha_role | default('unknown') != 'standby'
  tasks:
    - name: "FAILBACK | Trigger failback"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/failover"
        method: POST
        user: "{{ ansible_user }}"
        password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          command: run
          standby: true
        status_code: [200, 202, -1]
      delegate_to: localhost
      ignore_errors: true
      # TROUBLESHOOTING: no_log: true

    - name: "FAILBACK | Pause 30s to settle"
      ansible.builtin.pause:
        seconds: 30
  tags: [upgrade, failback]


# =============================================================================
# PLAY 8 - Final post-snapshot + diff report (both units)
# =============================================================================
- name: "BIG-IP HA Upgrade - Play 8: Final Post-Snapshot & Diff Report (Both Units)"
  hosts: "{{ target_hosts | default('bigip_ha') }}"
  gather_facts: false
  roles:
    - role: snapshot_post
    - role: snapshot_report
  tags: [snapshot, post_snapshot, report]


# =============================================================================
# PLAY 9 - Store all artifacts on bastion (JSON diffs + UCS backups)
# Structure: {{ bastion_backup_root }}/<hostname>/<date>/
# =============================================================================
- name: "BIG-IP HA Upgrade - Play 9: Store Artifacts on Bastion"
  hosts: "{{ target_hosts | default('bigip_ha') }}"
  gather_facts: false
  roles:
    - role: bastion_storage
  tags: [storage, bastion_storage]
