---
# =============================================================================
# BIG-IP HA Upgrade - AAP Extra Variables
# =============================================================================
# AAP 2.6: Job Template > Extra Variables > paste this content, update values.
#
# Bastion connection (user, password, become) comes from the AAP Machine
# Credential bound to the Job Template - not stored here.
# These extra vars cover only upgrade-specific parameters and path overrides.
# =============================================================================

# =============================================================================
# REQUIRED - Must be set for every upgrade run
# =============================================================================

# Target BIG-IP software version (used for post-upgrade version verification)
bigip_target_version: "17.1.1"

# ISO filename - must exist at {{ bastion_image_path }}/{{ bigip_image_filename }}
bigip_image_filename: "BIGIP-17.1.1-0.0.4.iso"

# Inventory hostname of the bastion (must match the host in [bastion] group)
bastion_host: "bastion01"

# =============================================================================
# BASTION - Path overrides
# Defaults are set in group_vars/bastion.yml. Override here if this run uses
# a different CIFS path (e.g. different software version folder).
# =============================================================================

# Root of CIFS mount on bastion where BIG-IP ISOs are staged
# Full image path: {{ bastion_image_path }}/{{ bigip_image_filename }}
bastion_image_path: "/mnt/cifs/bigip-images"

# Root of CIFS mount on bastion where backups are stored
# Structure: {{ bastion_backup_root }}/<device-hostname>/<date>/
bastion_backup_root: "/mnt/cifs/bigip-backups"

# =============================================================================
# BIG-IP SCP settings (bastion -> BIG-IP image transfer)
# =============================================================================

# Destination path on BIG-IP for SCP'd image
bigip_remote_image_path: "/shared/images"

# SSH user on BIG-IP the bastion will SCP as
bigip_scp_user: "admin"

# SSH port on BIG-IP management interface
bigip_scp_port: 22

# SCP options: no host key checking (BIG-IP keys change post-upgrade)
bigip_scp_opts: "-o StrictHostKeyChecking=no -o BatchMode=yes"

# =============================================================================
# INSTALL OPTIONS
# =============================================================================

# Boot volume to install to (HD1.2 = secondary, safe target)
bigip_install_volume: "HD1.2"

# Reboot into new volume immediately after install
bigip_reboot_after_install: true

# Set true to stage image and run checks but skip reboot
bigip_upgrade_dry_run: false

# =============================================================================
# HA OPTIONS
# =============================================================================

# Set true to fail back to original active after both nodes are upgraded
bigip_failback: false

# =============================================================================
# WAIT / REBOOT TIMING
# =============================================================================

bigip_reboot_initial_delay: 60
bigip_wait_retry_delay: 20
bigip_wait_max_retries: 30
bigip_ssh_port: 22
bigip_https_port: 443

# =============================================================================
# SNAPSHOT SETTINGS
# =============================================================================

# Staging dir on AAP EE runner (persists for life of job run)
snapshot_output_dir: "/runner/artifacts/snapshots"

# Save UCS on BIG-IP during pre-snapshot (SCPed to bastion in Play 9)
bigip_snapshot_save_ucs: true

# BIG-IP directory where UCS files are saved
bigip_ucs_path: "/var/local/ucs"

# Fail post-snapshot play if regressions detected
snapshot_fail_on_regression: true

# Pool members allowed to be down post-upgrade (0 = none)
snapshot_pool_member_down_threshold_pct: 0
