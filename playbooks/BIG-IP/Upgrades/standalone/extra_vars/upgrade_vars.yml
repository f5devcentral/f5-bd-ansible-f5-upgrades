---
# =============================================================================
# BIG-IP Standalone Upgrade - AAP Extra Variables
# =============================================================================
# AAP 2.6: Job Template > Extra Variables > paste this content, update values.
#
# Network topology:
#   bastion  <-- SSH -->  AAP EE  <-- SSH/HTTPS -->  BIG-IP
#   bastion  <-- SSH -->  AAP EE  <-- SSH/HTTPS -->  BIG-IP
#
# Image transfer: bastion SCPs directly to BIG-IP /shared/images/
# Backup storage: BIG-IP -> bigip_ucs_fetch module -> EE -> copy -> bastion CIFS
#
# Bastion connection (user/password/become) comes from the AAP Machine
# Credential. No connection vars belong in this file.
#
# WARNING: Do NOT include any of the following in AAP Extra Variables.
# They belong in group_vars/bigip.yml and inventory only. If set in
# extra_vars they override everything including bastion delegation:
#   ansible_connection
#   ansible_network_os
#   ansible_httpapi_port
#   ansible_httpapi_use_ssl
#   ansible_httpapi_validate_certs
# =============================================================================

# =============================================================================
# CONNECTION TIMEOUTS
# ansible_command_timeout controls how long the persistent httpapi connection
# waits for module responses. Default is 30s which is too short for
# bigip_device_info (AS3/package checks on init) and bigip_ucs_fetch
# (UCS creation takes significantly longer when AS3 is installed - known issue).
# Set to match bigip_ucs_timeout.
# Set here in extra_vars to ensure AAP picks it up (highest precedence).
# =============================================================================
ansible_command_timeout: 600



# Target BIG-IP software version (used for post-upgrade version verification)
# bigip_target_version is auto-parsed from bigip_image_filename or bigip_ehf_filename
# Format: BIGIP-17.5.1.5-0.0.6.iso -> 17.5.1.5
# bigip_target_version: "17.5.1.5"  # override only if auto-parse does not work

# ISO filename - must exist at {{ bastion_image_path }}/{{ bigip_image_filename }}
bigip_image_filename: "BIGIP-17.1.1-0.0.4.iso"

# Optional EHF (Engineering Hotfix) filename
# If set, the EHF ISO will be staged to BIG-IP and used for installation
# Both base image AND EHF must exist at {{ bastion_image_path }}
# Leave empty to install standard image only
# bigip_ehf_filename: "BIGIP-17.5.1.5-EHF-0.0.1.iso"

# =============================================================================
# BASTION - CIFS path vars
# =============================================================================

# Root of CIFS mount on bastion where BIG-IP ISOs are staged
bastion_image_path: "/mnt/cifs/bigip-images"

# Root of CIFS mount on bastion where backups are stored
# Structure: {{ bastion_backup_root }}/<device-hostname>/<date>/
bastion_backup_root: "/mnt/cifs/bigip-backups"

# =============================================================================
# EE STAGING
# Used only for snapshot JSONs and UCS files before bastion push.
# Images are uploaded directly from bastion to BIG-IP via curl (HTTPS).
# =============================================================================

# Staging dir for snapshot JSON and UCS files before bastion push
snapshot_output_dir: "/runner/artifacts/snapshots"

# =============================================================================
# INSTALL OPTIONS
# =============================================================================

bigip_install_volume: "HD1.2"
bigip_reboot_after_install: true
bigip_upgrade_dry_run: false

# =============================================================================
# LICENSE
# =============================================================================
# bigip_license_mode:
#   automatic   - EE proxies reactivation to activate.f5.com (recommended)
#                 BIG-IP does NOT need internet access - EE handles it
#   check_only  - validate serviceCheckDate only, FAIL if expired
#   skip        - skip license check for all hosts
#
# bigip_license_skip: true
#   Set per-host in inventory vars to skip license role for specific devices
#   Use for BIG-IQ licensed devices, lab/VE, air-gapped environments
#
# IMPORTANT - BIG-IQ Licensed Devices:
#   Set bigip_license_skip: true and reactivate manually via BIG-IQ before
#   running the upgrade. Do NOT use automatic mode on BIG-IQ licensed devices.
bigip_license_mode: automatic
bigip_license_skip: false

# F5 license server - must be reachable from AAP EE, not from BIG-IP
bigip_license_server: "activate.f5.com"


# Skip config sync after reactivation when nodes are on different versions
# Set automatically by Play 6 in HA - do not override here
bigip_license_skip_sync: false

# =============================================================================
# HA OPTIONS
# =============================================================================


# =============================================================================
# WAIT / REBOOT TIMING
# =============================================================================

bigip_reboot_initial_delay: 60
bigip_wait_retry_delay: 20
bigip_wait_max_retries: 30
bigip_ssh_port: 22
bigip_https_port: 443

# =============================================================================
# SNAPSHOT / BACKUP SETTINGS
# =============================================================================

# Save UCS backup from BIG-IP before upgrade and store on bastion
# Set false to skip UCS backup entirely - recommended if:
#   - AS3 is installed (UCS creation can take 30+ min - known F5 issue)
#   - Storage space on bastion is limited
#   - You have an alternative backup process
# Only a pre-upgrade UCS is taken (no post) - this is your rollback point
# KNOWN ISSUE: UCS creation takes significantly longer when AS3 is installed
# due to AS3 including all tenant declarations in the backup.
# Default timeout is 1800s (30 min) to account for this.
# Increase further on large devices with many AS3 tenants.
bigip_ucs_timeout: 1800
bigip_snapshot_save_ucs: true

# BIG-IP directory where UCS files are saved before fetch
bigip_ucs_path: "/var/local/ucs"

# Fail the post-snapshot play if regressions detected
snapshot_fail_on_regression: true

# Pool members allowed to be down post-upgrade (0 = none)
snapshot_pool_member_down_threshold_pct: 0
