---
# =============================================================================
# BIG-IP Standalone Upgrade Playbook
# =============================================================================
# Upgrade order:
#   0. Pre-flight    - validate extra_vars, check version, set timestamps
#   2. Image staging - bastion CIFS -> SCP -> BIG-IP
#   3. Pre-snapshot  - collect baseline state
#   4. Upgrade       - install and activate image, wait for device to return
#   5. Post-snapshot - collect post-upgrade state, diff, report
#   6. Store artifacts on bastion (JSON diffs + UCS)
#
# AAP 2.6 Setup:
#   Project    : f5-bd-ansible-f5-upgrades
#   Playbook   : playbooks/BIG-IP/Upgrades/standalone/upgrade.yaml
#   Inventory  : [bigip_standalone] group
#   Credential : AAP Machine Credential for BIG-IP devices
#   Extra Vars : paste contents of extra_vars/upgrade_vars.yml and update values
#
# Network topology:
#   bastion  <-- SSH -->  AAP EE  <-- SSH/HTTPS -->  BIG-IP
#
# NOTE: Standalone device will be OFFLINE during upgrade reboot.
#       Schedule this during a maintenance window.
# =============================================================================


# =============================================================================
# PLAY 0 - Pre-flight: validate extra_vars, check version, set timestamps
# =============================================================================
- name: "BIG-IP Standalone Upgrade - Play 0: Pre-flight Checks"
  hosts: "{{ target_hosts | default('bigip_standalone') }}"
  gather_facts: false
  vars:
    _snapshot_timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
    _backup_date: "{{ lookup('pipe', 'date +%Y-%m-%d') }}"
  tasks:

    - name: "PREFLIGHT | Validate required extra vars are set"
      ansible.builtin.fail:
        msg: "Missing required extra var: '{{ item }}' - set it in AAP Extra Variables."
      when: vars[item] is not defined or vars[item] | string | length == 0
      loop:
        - bigip_image_filename
        - bastion_image_path
        - bastion_backup_root
      delegate_to: localhost

    - name: "PREFLIGHT | Set target version - explicit override or auto-parse from filename"
      ansible.builtin.set_fact:
        bigip_target_version: >-
          {{ bigip_target_version
             if bigip_target_version is defined and bigip_target_version != ''
             else (bigip_ehf_filename if bigip_ehf_filename is defined and bigip_ehf_filename != ''
                   else bigip_image_filename)
                  | regex_replace('^(?:Hotfix-)?BIGIP-(\d+\.\d+\.\d+\.\d+).*\.iso$', '\1') }}
        cacheable: true

    - name: "PREFLIGHT | Fail if target version cannot be determined from filename"
      ansible.builtin.fail:
        msg: |
          Cannot determine target version from image filename.
          Filename '{{ bigip_ehf_filename if bigip_ehf_filename is defined and bigip_ehf_filename != '' else bigip_image_filename }}'
          does not match expected format BIGIP-X.X.X.X-*.iso
          Options:
            - Rename the ISO to the original F5 filename format e.g. BIGIP-17.5.1.5-0.0.6.iso
            - Set bigip_target_version: "17.5.1.5" explicitly in AAP Extra Variables
      when: bigip_target_version | regex_search('^\d+\.\d+\.\d+\.\d+$') is none

    - name: "PREFLIGHT | Query current software version"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:{{ bigip_https_port | default(443) }}/mgmt/tm/sys/version"
        method: GET
        user: "{{ ansible_user }}"
        password: "{{ ansible_password | default(ansible_httpapi_password) | default(omit) }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
      register: preflight_version_query
      delegate_to: localhost
      # TROUBLESHOOTING: no_log: true

    - name: "PREFLIGHT | Parse version from query response"
      ansible.builtin.set_fact:
        bigip_current_version: >-
          {{ preflight_version_query.json.get('entries', {})
             .get('https://localhost/mgmt/tm/sys/version/0', {})
             .get('nestedStats', {})
             .get('entries', {})
             .get('Version', {})
             .get('description', 'unknown') }}

    - name: "PREFLIGHT | Already on target version - nothing to do"
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} is already running {{ bigip_current_version }} - skipping upgrade."
      when: bigip_target_version in bigip_current_version

    - name: "PREFLIGHT | Skip if already on target version"
      ansible.builtin.meta: end_host
      when: bigip_target_version in bigip_current_version

    - name: "PREFLIGHT | Cache snapshot_timestamp and backup_date across all plays"
      ansible.builtin.set_fact:
        snapshot_timestamp: "{{ _snapshot_timestamp }}"
        backup_date: "{{ _backup_date }}"
        cacheable: true

    - name: "PREFLIGHT | Summary"
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} ({{ ansible_host }}) |
          Version: {{ bigip_current_version }} |
          Target: {{ bigip_target_version }} |
          Timestamp: {{ snapshot_timestamp }}


# =============================================================================
# PLAY 1 - License check and reactivation
# =============================================================================
- name: "BIG-IP Standalone Upgrade - Play 1: License Check and Reactivation"
  hosts: "{{ target_hosts | default('bigip_standalone') }}"
  gather_facts: false
  roles:
    - role: bigip_license
  tags: [license]


# =============================================================================
# PLAY 2 - Image staging: bastion CIFS -> SCP -> BIG-IP
# =============================================================================
- name: "BIG-IP Standalone Upgrade - Play 2: Stage Image via Bastion"
  hosts: "{{ target_hosts | default('bigip_standalone') }}"
  gather_facts: false
  roles:
    - role: bastion_image_push
  tags: [image, image_push]


# =============================================================================
# PLAY 3 - Pre-snapshot
# =============================================================================
- name: "BIG-IP Standalone Upgrade - Play 3: Pre-Snapshot"
  hosts: "{{ target_hosts | default('bigip_standalone') }}"
  gather_facts: false
  roles:
    - role: snapshot_pre
  tags: [snapshot, pre_snapshot]


# =============================================================================
# PLAY 4 - Upgrade: install, activate, wait for device to return
# =============================================================================
- name: "BIG-IP Standalone Upgrade - Play 4: Upgrade Device"
  hosts: "{{ target_hosts | default('bigip_standalone') }}"
  gather_facts: false
  pre_tasks:
    - name: "UPGRADE | Confirm upgrade target"
      ansible.builtin.debug:
        msg: >-
          Upgrading STANDALONE: {{ inventory_hostname }} ({{ ansible_host }})
          WARNING: Device will be offline during reboot.
  roles:
    - role: bigip_upgrade
    - role: bigip_wait
  tags: [upgrade]


# =============================================================================
# PLAY 5 - Post-snapshot + diff report
# =============================================================================
- name: "BIG-IP Standalone Upgrade - Play 5: Post-Snapshot & Diff Report"
  hosts: "{{ target_hosts | default('bigip_standalone') }}"
  gather_facts: false
  roles:
    - role: snapshot_post
    - role: snapshot_report
  tags: [snapshot, post_snapshot, report]


# =============================================================================
# PLAY 6 - Store artifacts on bastion
# =============================================================================
- name: "BIG-IP Standalone Upgrade - Play 6: Store Artifacts on Bastion"
  hosts: "{{ target_hosts | default('bigip_standalone') }}"
  gather_facts: false
  roles:
    - role: bastion_storage
  tags: [storage, bastion_storage]
