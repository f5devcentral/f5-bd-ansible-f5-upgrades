---
# =============================================================================
# group_vars/f5os.yml
# =============================================================================
# Variables for all F5OS devices (rSeries and Velos).
# Applied via AAP inventory group vars.
#
# CREDENTIALS: ansible_user and ansible_httpapi_password come from the
# AAP Machine Credential - never store them here.
# =============================================================================

# -----------------------------------------------------------------------------
# Connection - httpapi over RESTCONF
# F5OS uses port 443 for rSeries, 8888 for Velos controller
# Override per-group in AAP inventory if needed
# -----------------------------------------------------------------------------
ansible_connection: httpapi
ansible_network_os: f5networks.f5os.f5os
ansible_httpapi_port: 443
ansible_httpapi_use_ssl: true
ansible_httpapi_validate_certs: false
ansible_command_timeout: 600

# -----------------------------------------------------------------------------
# Wait / reboot timing
# -----------------------------------------------------------------------------
f5os_reboot_initial_delay: 60
f5os_wait_retry_delay: 20
f5os_wait_max_retries: 30
f5os_https_port: 443

# -----------------------------------------------------------------------------
# Snapshot settings
# -----------------------------------------------------------------------------
snapshot_output_dir: "/runner/artifacts/snapshots"
